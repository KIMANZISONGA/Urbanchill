<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UrbanChill Cockpit</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:#e2e8f0;
}

header {
  padding:12px;
  background:#020617;
  display:flex;
  justify-content:space-between;
}

.layout {
  display:grid;
  grid-template-columns:300px 1fr 300px;
  height:calc(100vh - 50px);
}

.panel {
  padding:12px;
  overflow:auto;
}

.item {
  padding:10px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
}

.item:hover {
  background:#1e293b;
}

input, select, textarea {
  width:100%;
  margin-bottom:8px;
  background:#020617;
  color:#e2e8f0;
  border:1px solid #1e293b;
}

button {
  padding:8px;
  background:#22c55e;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <b>UrbanChill Cockpit (RESTORED)</b>
  <button onclick="refreshAll()">Refresh</button>
</header>

<div class="layout">

<!-- LIST -->
<div class="panel" id="list"></div>

<!-- DETAIL -->
<div class="panel" id="detail"></div>

<!-- RIGHT -->
<div class="panel">
  <h3>Offer</h3>
  <div id="offer"></div>

  <h3>Timeline</h3>
  <div id="timeline"></div>

  <h3>Cases</h3>
  <div id="cases"></div>
</div>

</div>

<script>
const API = "/api";

let state = {
  intakes: [],
  current: null,
  form: {},
  offer: {},
  messages: [],
  cases: []
};

/* LOAD */

async function load(){
  const res = await fetch(API + "/intakes");
  state.intakes = await res.json();
  renderList();

  if(state.intakes.length){
    openItem(state.intakes[0].id);
  }
}

async function loadCases(){
  const res = await fetch(API + "/cases");
  state.cases = await res.json();
  renderCases();
}

async function loadMessages(id){
  const res = await fetch(API + "/messages?intake_id=" + id);
  state.messages = await res.json();
  renderTimeline();
}

/* HELPERS */

function parseJSON(v){
  try { return JSON.parse(v || "[]"); }
  catch { return []; }
}

function getMulti(el){
  return [...el.selectedOptions].map(o => o.value);
}

/* LIST */

function renderList(){
  const el = document.getElementById("list");

  el.innerHTML = state.intakes.map(i => `
    <div class="item" onclick="openItem('${i.id}')">
      <b>${i.name}</b><br>
      ${i.email}<br>
      ${i.status || ""}
    </div>
  `).join("");
}

/* OPEN */

window.openItem = function(id){
  const item = state.intakes.find(i => i.id === id);
  if(!item) return;

  state.current = item;

  state.form = {
    ...item,
    activities: parseJSON(item.activities),
    dietary_preferences: parseJSON(item.dietary_preferences)
  };

  state.offer = {
    service: item.offer_service || "",
    price: item.offer_price || 0,
    extra_days: item.offer_extra_days || 0,
    pickup_km: item.offer_pickup_km || 0
  };

  renderDetail();
  renderOffer();
  loadMessages(id);
};

/* DETAIL */

function renderDetail(){
  const i = state.form;

  document.getElementById("detail").innerHTML = `
    <h3>Klant</h3>

    Naam:
    <input value="${i.name||""}" onchange="setField('name',this.value)">

    Email:
    <input value="${i.email||""}" onchange="setField('email',this.value)">

    Telefoon:
    <input value="${i.phone||""}" onchange="setField('phone',this.value)">

    Dienst:
    <select onchange="setField('service',this.value)">
      <option ${i.service==="solo"?"selected":""}>solo</option>
      <option ${i.service==="remote"?"selected":""}>remote</option>
      <option ${i.service==="adventure"?"selected":""}>adventure</option>
    </select>

    Aankomst:
    <input value="${i.arrival_date||""}" onchange="setField('arrival_date',this.value)">

    <h3>Profiel</h3>

    Activiteiten:
    <select multiple onchange="setField('activities',getMulti(this))">
      ${["nightlife","restaurants","sightseeing","musea"]
        .map(v=>`<option ${i.activities.includes(v)?"selected":""}>${v}</option>`).join("")}
    </select>

    Dieet:
    <select multiple onchange="setField('dietary_preferences',getMulti(this))">
      ${["vegan","vegetarian","halal","gluten_free"]
        .map(v=>`<option ${i.dietary_preferences.includes(v)?"selected":""}>${v}</option>`).join("")}
    </select>

    Lifestyle:
    <input value="${i.lifestyle||""}" onchange="setField('lifestyle',this.value)">

    Allergieën:
    <input value="${i.allergies||""}" onchange="setField('allergies',this.value)">

    Notities:
    <textarea onchange="setField('notes',this.value)">${i.notes||""}</textarea>

    <br>
    <button onclick="save()">Opslaan</button>
  `;
}

window.setField = (f,v)=>state.form[f]=v;

/* SAVE */

window.save = async function(){
  await fetch(API + "/intake/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id: state.current.id,
      ...state.form
    })
  });

  alert("Opgeslagen");
}

/* OFFER */

function renderOffer(){
  const o = state.offer;

  document.getElementById("offer").innerHTML = `
    Prijs:
    <input value="${o.price}" onchange="setOffer('price',this.value)">

    Extra dagen:
    <input value="${o.extra_days}" onchange="setOffer('extra_days',this.value)">

    Pickup km:
    <input value="${o.pickup_km}" onchange="setOffer('pickup_km',this.value)">

    <button onclick="saveOffer()">Save</button>
    <button onclick="sendOffer()">Send</button>
  `;
}

window.setOffer = (f,v)=>state.offer[f]=v;

window.saveOffer = async function(){
  await fetch(API + "/intake/offer",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ id: state.current.id, ...state.offer })
  });
};

window.sendOffer = async function(){
  await fetch(API + "/intake/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ id: state.current.id })
  });

  loadMessages(state.current.id);
};

/* TIMELINE */

function renderTimeline(){
  const el = document.getElementById("timeline");

  el.innerHTML = state.messages.map(m => `
    <div class="item">
      ${m.message}
    </div>
  `).join("");
}

/* CASES */

function renderCases(){
  const el = document.getElementById("cases");

  el.innerHTML = state.cases.map(c => `
    <div class="item">${c.client_name}</div>
  `).join("");
}

/* INIT */

window.refreshAll = async ()=>{
  await load();
  await loadCases();
}

load();
loadCases();
</script>

</body>
</html>
