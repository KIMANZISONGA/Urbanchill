<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanChill Cockpit</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root{
      --bg:#0f141b;
      --panel:#171f2b;
      --panel-2:#1e2735;
      --line:#2c3646;
      --text:#e6edf3;
      --muted:#9fb0c4;
      --gold:#c8a96b;
      --soft:#334157;
      --input:#121821;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body{overflow:hidden}

    header{
      height:72px;
      padding:20px;
      border-bottom:1px solid var(--line);
      background:#111720;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .header-left h1{
      margin:0;
      font-size:20px;
      font-weight:700;
    }

    .header-sub{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
    }

    .header-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    button{
      padding:8px 12px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-size:13px;
      font-weight:600;
    }

    .btn-ghost{
      background:transparent;
      color:#fff;
      border:1px solid var(--line);
    }

    .app{
      display:grid;
      grid-template-columns:320px minmax(0,1fr);
      height:calc(100vh - 72px);
    }

    .sidebar{
      background:var(--panel);
      border-right:1px solid var(--line);
      overflow:auto;
    }

    .main{
      overflow:auto;
      background:var(--bg);
    }

    .section-head{
      position:sticky;
      top:0;
      z-index:5;
      background:#111720;
      border-bottom:1px solid var(--line);
      padding:14px 16px;
    }

    .section-head h2{
      margin:0 0 12px 0;
      font-size:18px;
      color:var(--gold);
    }

    .search{
      width:100%;
      padding:10px 12px;
      background:var(--input);
      border:1px solid var(--line);
      border-radius:8px;
      color:#fff;
      font:inherit;
    }

    .list{
      padding:12px;
    }

    .content{
      padding:20px;
      max-width:1200px;
    }

    .kpis{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-bottom:16px;
    }

    .kpi{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
    }

    .kpi .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .kpi .value{
      font-size:24px;
      font-weight:700;
    }

    .empty{
      color:var(--muted);
      padding:20px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:12px;
    }

    .item{
      background:var(--panel-2);
      border:1px solid #2e3a4f;
      border-radius:10px;
      padding:12px;
      margin-bottom:10px;
      cursor:pointer;
      transition:border-color .15s ease, transform .15s ease;
    }

    .item:hover{
      border-color:#466086;
      transform:translateY(-1px);
    }

    .item.active{
      outline:2px solid var(--gold);
    }

    .item b{
      display:block;
      margin-bottom:4px;
      font-size:14px;
      color:var(--text);
    }

    .item small{
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:12px;
      padding:16px;
      margin-bottom:16px;
    }

    .panel h3{
      margin:0 0 14px 0;
      font-size:17px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:12px;
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin:0 0 6px 0;
    }

    input,textarea,select{
      width:100%;
      min-width:0;
      padding:10px 12px;
      border-radius:8px;
      border:1px solid var(--line);
      background:var(--input);
      color:#fff;
      font:inherit;
    }

    textarea{
      min-height:86px;
      resize:vertical;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#131a24;
      cursor:pointer;
      user-select:none;
      font-size:13px;
      margin:0 8px 8px 0;
    }

    .chip.active{
      background:rgba(200,169,107,.18);
      border-color:var(--gold);
    }

    .price{
      font-size:28px;
      font-weight:700;
      margin:8px 0 0 0;
    }

    @media (max-width: 980px){
      body{overflow:auto}

      .app{
        grid-template-columns:1fr;
        height:auto;
      }

      .kpis,
      .grid-2{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>UrbanChill Cockpit</h1>
      <div class="header-sub">Intakes, offertes en cases</div>
    </div>

    <div class="header-actions">
      <button class="btn-ghost" onclick="load()">Ververs</button>
    </div>
  </header>

  <div class="app">
    <aside class="sidebar">
      <div class="section-head">
        <h2>Intakes</h2>
        <input
          id="searchIntakes"
          class="search"
          type="text"
          placeholder="Zoek naam of e-mail..."
          oninput="filterList()"
        >
      </div>
      <div id="list" class="list"></div>
    </aside>

    <main class="main">
      <div class="content">
        <div class="kpis">
          <div class="kpi">
            <div class="label">Intakes</div>
            <div class="value" id="stat-intakes">0</div>
          </div>
          <div class="kpi">
            <div class="label">Offertes verstuurd</div>
            <div class="value" id="stat-offers">0</div>
          </div>
          <div class="kpi">
            <div class="label">Cases</div>
            <div class="value" id="stat-cases">0</div>
          </div>
        </div>

        <div id="detail" class="empty">
          Selecteer links een intake om het dossier te openen.
        </div>
      </div>
    </main>
  </div>

  <script>
    function filterList(){
      if(typeof state === "undefined" || !Array.isArray(state.intakes)) return;

      const q = (document.getElementById("searchIntakes")?.value || "").trim().toLowerCase();

      const filtered = state.intakes.filter(i => {
        const hay = [
          i.name || "",
          i.email || "",
          i.phone || "",
          i.service || ""
        ].join(" ").toLowerCase();
        return hay.includes(q);
      });

      const list = document.getElementById("list");
      if(!list) return;

      list.innerHTML = filtered.map(i => `
        <div class="item ${state.current && state.current.id === i.id ? "active":""}" onclick="openItem('${i.id}')">
          <b>${i.name || "-"}</b>
          <small>${i.email || "-"}</small>
        </div>
      `).join("");

      if(!filtered.length){
        list.innerHTML = '<div class="empty">Geen resultaten</div>';
      }
    }
  </script>

  <script src="app.js"></script>
</body>
</html>
