<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">

<title>UrbanChill Cockpit V10.3 — KIMANZI Theme</title>

<style>
body{color:#e2e8f0}
main.container{max-width:100%}

/* ===== TOP 8.0.3 theming per tab (subtiel, inclusief finance) ===== */
body.theme-intakes{
  background: linear-gradient(180deg, #2f4a22 0%, #1b2b16 60%, #0f172a 100%);
}
body.theme-cases{
  background: linear-gradient(180deg, #6b5b34 0%, #2a2419 60%, #0f172a 100%);
}
body.theme-messages{
  background: linear-gradient(180deg, #2b3441 0%, #151a22 60%, #0f172a 100%);
}
body.theme-finance{
  background: linear-gradient(180deg, #0f3d3e 0%, #0b2530 58%, #0f172a 100%);
}
main.container{
  min-height: calc(100vh - 110px);
  background: radial-gradient(900px 500px at 20% 10%, rgba(255,255,255,.04), transparent 60%),
              radial-gradient(700px 450px at 85% 15%, rgba(56,189,248,.05), transparent 60%);
  border-radius: 16px;
}

/* active tab accent per theme */
body.theme-intakes  .navbtn.active{ border-color:#a3c35b; box-shadow:0 0 0 2px rgba(163,195,91,.12) inset; }
body.theme-cases    .navbtn.active{ border-color:#d7b46a; box-shadow:0 0 0 2px rgba(215,180,106,.12) inset; }
body.theme-messages .navbtn.active{ border-color:#94a3b8; box-shadow:0 0 0 2px rgba(148,163,184,.16) inset; }
body.theme-finance  .navbtn.active{ border-color:#2dd4bf; box-shadow:0 0 0 2px rgba(45,212,191,.14) inset; }

.navbar{
  display:flex; align-items:center; justify-content:space-between;
  padding: .8rem 1rem;
}
.nav-left{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.nav-right{display:flex;gap:.6rem;align-items:center}
.navbtn{
  border:1px solid #1e293b; background:#020617; color:#e2e8f0;
  padding:.45rem .75rem; border-radius:10px; cursor:pointer;
}
.navbtn.active{border-color:#38bdf8; box-shadow:0 0 0 2px rgba(56,189,248,.15) inset;}
.navlink{color:#38bdf8; text-decoration:none; cursor:pointer;}

.layout{display:grid;grid-template-columns:280px 2fr 1.7fr;gap:1rem}
.panel{background:#020617;padding:1rem;border-radius:12px;min-height:220px}
body.theme-finance .panel{
  background: linear-gradient(180deg, rgba(3,10,18,.92) 0%, rgba(3,11,22,.98) 100%);
  border: 1px solid rgba(45,212,191,.18);
  box-shadow: 0 10px 30px rgba(2,8,23,.22);
}
body.theme-finance .pill{
  border-color: rgba(45,212,191,.25);
  color: #99f6e4;
}
body.theme-finance .item.active{
  border-color: rgba(45,212,191,.45);
  background: rgba(20,184,166,.08);
}
body.theme-finance .closebtn,
body.theme-finance button,
body.theme-finance input,
body.theme-finance select,
body.theme-finance textarea{
  border-color: rgba(45,212,191,.32);
}

.item{padding:.6rem;border-bottom:1px solid #1e293b;cursor:pointer}
.item:hover{background:#1e293b}
.item .small{font-size:12px;color:#94a3b8}

input,select,textarea{
  background:#020617;
  color:#e2e8f0;
  padding:.6rem;
  resize: vertical;
  overflow: auto;
}

.label{margin-top:.6rem;display:block;font-weight:600}
.section{margin-top:1rem;padding-top:.5rem;border-top:1px solid #1e293b}
.section h4{margin-bottom:.3rem}
.hint{font-size:12px;color:#94a3b8}
.actions{margin-top:.8rem;display:flex;gap:.5rem;flex-wrap:wrap}
.kpi{border:1px solid #1e293b;padding:.6rem;border-radius:10px;margin-top:.5rem}
.small{font-size:12px;color:#94a3b8}
.breakdown{margin-top:.6rem;border:1px solid #1e293b;border-radius:10px;padding:.6rem}
.row{display:flex;justify-content:space-between;gap:1rem;padding:.25rem 0;border-bottom:1px solid #0b1220}
.row:last-child{border-bottom:0}
.amt{font-variant-numeric:tabular-nums}
.banner{border:1px solid #334155;border-radius:10px;padding:.6rem;margin-bottom:.75rem;background: rgba(51,65,85,.15);}

.checkgrid{display:grid;grid-template-columns:1fr 1fr;gap:.25rem .75rem;margin:.25rem 0}
.checkgrid label{font-weight:400;margin:0;display:flex;gap:.45rem;align-items:center}
.checkgrid input[type="checkbox"]{margin:0}
.inline{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.pill{border:1px solid #1e293b;border-radius:999px;padding:.15rem .55rem;font-size:12px;color:#94a3b8}
.badge{display:inline-block;border:1px solid #1e293b;border-radius:999px;padding:.15rem .55rem;font-size:12px;color:#94a3b8;margin-left:.4rem}
hr{border-color:#1e293b}

/* case snapshot layout helpers */
.kv{display:grid;grid-template-columns:180px 1fr;gap:.25rem .75rem;align-items:start;margin-top:.25rem}
.kv .k{color:#94a3b8;font-size:12px}
.kv .v{word-break:break-word}

/* right panel helpers */
.smallbtn{
  border:1px solid #1e293b; background:#020617; color:#e2e8f0;
  padding:.35rem .6rem; border-radius:10px; cursor:pointer; font-size:12px;
}
.smallbtn:hover{border-color:#38bdf8}

/* CASE filter UI */
.filterbox{
  border:1px solid #1e293b;
  border-radius:12px;
  padding:.6rem;
  margin-bottom:.6rem;
  background: rgba(148,163,184,.03);
}
.filterbox .label{margin-top:.35rem}
.filterbox input, .filterbox select{padding:.45rem}

/* messages filter UI */
.msgfilter{
  border:1px solid #1e293b;
  border-radius:12px;
  padding:.6rem;
  margin-bottom:.6rem;
  background: rgba(148,163,184,.03);
}
.msgpill{
  display:inline-block;
  border:1px solid #1e293b;
  border-radius:999px;
  padding:.12rem .5rem;
  font-size:12px;
  color:#94a3b8;
  margin-right:.35rem;
}
pre.msgpre{
  white-space:pre-wrap;
  word-break:break-word;
  margin:0;
  font-family:inherit;
  background: rgba(223,211,168,.35);
  color: rgba(34,32,32,.92);
  border-radius: 8px;
  padding: .75rem;
  min-height: 80px;
  font-size: 14px;
  line-height: 1.6;
}

.theme-finance .nav{border-color:#2dd4bf}

/* --- collapsible sections (case) --- */
details.collapse{
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;
  padding: .35rem .6rem;
  margin: .5rem 0;
  background: rgba(0,0,0,.08);
}
details.collapse > summary{
  cursor: pointer;
  list-style: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .75rem;
  font-weight: 600;
  padding: .2rem 0;
}
details.collapse > summary::-webkit-details-marker{ display:none; }
details.collapse .smallhint{ opacity:.75; font-weight:400; }
details.collapse[open]{ background: rgba(0,0,0,.12); }

.panelhead{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:.75rem;
  margin-bottom:.25rem;
}
.panelhead h3{margin:0}
.detailtop{
  display:flex;
  justify-content:flex-end;
  margin:-.25rem 0 .5rem 0;
}
.closebtn{
  border:1px solid #38bdf8;
  background:#0f172a;
  color:#e2e8f0;
  padding:.45rem .85rem;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}
.closebtn:hover{border-color:#7dd3fc}

/* =========================
   UrbanChill × Kimanzi — warm beige theme
   ========================= */

.topbar-strip{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:.5rem 1rem;

  display:flex;
  align-items:center;

  flex-wrap:wrap;
}
.topbar-btn{

  background:rgba(223,211,168,.16);

}

  background:rgba(208,119,35,.2);

}

  border-color:rgba(208,80,60,.3);

}
.topbar-btn-danger:hover{
  background:rgba(208,80,60,.12);
  color:rgba(240,170,150,.95);
}
.topbar-version{
  font-size:11px;
  color:rgba(223,211,168,.4);
  padding:.3rem .5rem;
}

body.theme-intakes,

}

.navbar{ padding: 1rem 1rem .6rem 1rem !important; }

/* 5 tegels op 1 rij */
@media (min-width: 900px){
  .nav-left{
    display:grid !important;
    grid-template-columns: repeat(6, minmax(0, 1fr)) !important;
    align-items:stretch !important;
    column-gap: 1rem !important;
    row-gap: .8rem !important;
    width: min(1280px, 100%) !important;
  }
  .nav-left strong{
    grid-column: 1 / -1 !important;
    margin-bottom: .15rem !important;
  }

    width: 100% !important;
    min-width: 0 !important;
  }
}

.navbtn.active{ border-color: rgba(208,119,35,.75) !important; box-shadow: 0 0 0 2px rgba(208,119,35,.14) inset, 0 10px 22px rgba(43,29,18,.14) !important; }

button{ border-color: rgba(34,32,32,.22) !important; }

}
#middleCloseBtn .icon-only{
  display:inline-block;

}

.offer-compose .offer-toggle{
  display:flex;

  gap:.6rem;
  padding:.28rem .45rem;

}

}

/* ===== Visible receipt / reimbursement checkboxes ===== */
.receipt-options{
  display:grid;
  gap:.45rem;
  margin:.55rem 0 .35rem 0;
}
.receipt-check{
  display:flex !important;
  align-items:center;
  gap:.65rem;
  padding:.55rem .7rem;
  border:1px solid rgba(92,67,42,.24);
  border-radius:12px;
  background:rgba(255,255,255,.22);
  cursor:pointer;
  user-select:none;
  font-weight:700;
}
.receipt-check input[type="checkbox"]{
  appearance:none !important;
  -webkit-appearance:none !important;
  width:24px !important;
  height:24px !important;
  min-width:24px !important;
  min-height:24px !important;
  margin:0 !important;
  padding:0 !important;
  border:2px solid rgba(43,29,18,.55) !important;
  border-radius:7px !important;
  background:rgba(255,255,255,.66) !important;
  position:relative;
  cursor:pointer;
  box-shadow:0 1px 3px rgba(43,29,18,.16);
}
.receipt-check input[type="checkbox"]:checked{
  background:rgba(26,66,46,.92) !important;
  border-color:rgba(26,66,46,.98) !important;
}
.receipt-check input[type="checkbox"]:checked::after{
  content:"✓";
  position:absolute;
  left:4px;
  top:-2px;
  color:#DFD3A8;
  font-size:22px;
  line-height:24px;
  font-weight:900;
}
.receipt-check:has(input[type="checkbox"]:checked){
  background:rgba(26,66,46,.12);
  border-color:rgba(26,66,46,.38);
}
.receipt-pill{
  display:inline-block;
  border:1px solid rgba(92,67,42,.24);
  border-radius:999px;
  padding:.14rem .5rem;
  margin:.08rem .2rem .08rem 0;
  font-size:12px;
  font-weight:700;
  background:rgba(255,255,255,.22);
}
.receipt-pill.yes{
  border-color:rgba(26,66,46,.35);
  background:rgba(26,66,46,.12);
  color:rgba(26,66,46,.96);
}
.receipt-pill.no{
  border-color:rgba(128,62,30,.28);
  background:rgba(208,119,35,.10);
  color:rgba(87,48,22,.92);
}

:root{
  --v10-bg:#f4f6f3;
  --v10-surface:#ffffff;
  --v10-surface-soft:#f8faf8;

<script>
const API_BASE = (location && location.origin) ? location.origin : "";
const API = API_BASE + "/api";
// Admin key: prefer a local override to avoid hardcoding secrets in the HTML.
// Set it once in the browser console: localStorage.setItem('UC_ADMIN_KEY','...your key...')
const ADMIN_KEY_FALLBACK = ""; // SECURITY: do not hardcode secrets in client HTML
function getAdminKey(){
  // SECURITY: key must be provided locally (per browser) via storage.
  // sessionStorage = only this session/tab; localStorage = remember on this device.
  try{
    const s = sessionStorage.getItem('UC_ADMIN_KEY') || "";
    if(s) return s;
  }catch(e){}
  try{ return localStorage.getItem('UC_ADMIN_KEY') || ""; }catch(e){ return ""; }
}

const BUILD = "UrbanChill Cockpit · V10.7 Email notificatie";
const BUILD_DESC = "Berichten teller: website-only";
document.getElementById("buildTag").textContent = BUILD;

function apiFetchRaw(url, options = {}) {
  const adminKey = getAdminKey();
  if(!adminKey){
    // Fail fast: do not call the API without a key (security + avoids noisy 401 spam)
    setLastApiError({
      type: "auth",
      message: "Missing UC_ADMIN_KEY (klik rechtsboven op Admin key)",
      url: String(url||""),
      path: (()=>{ try{ return new URL(url, location.origin).pathname; }catch(e){ return String(url||""); } })(),
      at: new Date().toISOString()
    });
    return Promise.reject(new Error("Missing UC_ADMIN_KEY"));
  }

  const headers = {
    "X-Admin-Key": adminKey,
    "Accept": "application/json",
    ...(options.headers || {})
  };

  // Use native fetch (NOT recursive)
  return fetch(url, {
    ...options,
    headers
  });
}
function setLastApiError(info){
  try{ state.lastApiError = info || null; }catch(e){}
}
function apiErrorSummary(){
  const e = state.lastApiError;
  if(!e) return "";
  if(e.type === "auth") return `auth • ${e.message || "missing key"}`;
  if(e.type === "http") return `${e.status} • ${e.path || e.url || ""}`;
  if(e.type === "network") return `network • ${e.message || ""}`;
  return "error";
}
window.copyLastApiError = function(){
  const e = state.lastApiError;
  if(!e){ alert("Geen API fout opgeslagen."); return; }
  const txt = JSON.stringify(e, null, 2);
  navigator.clipboard?.writeText(txt).then(
    ()=>alert("Gekopieerd ✅"),
    ()=>alert(txt)
  );
};


/* ========= Admin key UI (Option B) =========
   - sessionStorage default (portable, per session)
   - optional remember on this device via localStorage
*/
function setAdminKeyValue(key, remember){
  const v = String(key||"").trim();
  try{ sessionStorage.removeItem('UC_ADMIN_KEY'); }catch(e){}
  if(!v){
    if(remember){
      try{ localStorage.removeItem('UC_ADMIN_KEY'); }catch(e){}
    }
    return;
  }
  if(remember){
    try{ localStorage.setItem('UC_ADMIN_KEY', v); }catch(e){}
  } else {
    try{ sessionStorage.setItem('UC_ADMIN_KEY', v); }catch(e){}
  }
}

function openAdminKeyDialog(){
  const current = getAdminKey();
  const pasted = prompt(
    "Admin key instellen\n\nPlak je UC admin key.\nLaat leeg om te wissen.",
    current || ""
  );
  if(pasted === null) return; // cancelled

  const key = String(pasted||"").trim();

  if(!key){
    const wipeAll = confirm("Key wissen?\n\nOK = ook uit localStorage verwijderen (dit apparaat)\nAnnuleren = alleen sessie wissen");
    if(wipeAll){
      try{ localStorage.removeItem('UC_ADMIN_KEY'); }catch(e){}
      try{ sessionStorage.removeItem('UC_ADMIN_KEY'); }catch(e){}
    } else {
      try{ sessionStorage.removeItem('UC_ADMIN_KEY'); }catch(e){}
    }
    alert("Admin key gewist ✅");
    return;
  }

  const remember = confirm("Key onthouden op dit apparaat?\n\nOK = onthouden (localStorage)\nAnnuleren = alleen deze sessie (sessionStorage)");
  setAdminKeyValue(key, remember);
  alert("Admin key ingesteld ✅");
}
function apiFetch(url, options = {}){
  const path = (()=>{ try{ return new URL(url, location.origin).pathname; }catch(e){ return String(url||""); } })();
  try{
    const p = apiFetchRaw(url, options);
    // Track HTTP errors (promise resolves with Response)
    return p.then(res=>{
      if(!res.ok){
        setLastApiError({ type:"http", status: res.status, url: String(url||""), path, at: new Date().toISOString() });
      }
      return res;
    }).catch(err=>{
      setLastApiError({ type:"network", message: String(err?.message || err || "network_error"), url: String(url||""), path, at: new Date().toISOString() });
      throw err;
    });
  }catch(err){
    setLastApiError({ type:"network", message: String(err?.message || err || "network_error"), url: String(url||""), path, at: new Date().toISOString() });
    throw err;
  }
}

/* ========= helpers ========= */

function escapeHtml(s){
  return String(s??"")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function toInt(v){ const n=parseInt(v,10); return Number.isFinite(n)?n:0; }
function toBoolInt(v){ return String(v)==="1" || v===1 || v===true ? 1 : 0; }
function euro(n){
  const x=(typeof n==="number")?n:parseFloat(n);
  if(!Number.isFinite(x)) return "€0";
  const hasDec=Math.round(x*100)!==Math.round(x)*100;
  return "€"+(hasDec?x.toFixed(2):String(Math.round(x)));
}
function safeParseArray(v,fallback=[]){
  if(Array.isArray(v)) return v;
  if(v===null||v===undefined||v==="") return fallback;
  if(typeof v==="string"){
    try{ const p=JSON.parse(v); return Array.isArray(p)?p:fallback; }
    catch{ return v.split(",").map(x=>x.trim()).filter(Boolean); }
  }
  return fallback;
}
function safeParseObj(v){
  if(!v) return null;
  if(typeof v==="object") return v;
  if(typeof v==="string"){
    try{ return JSON.parse(v); }catch{ return null; }
  }
  return null;
}

function buildCaseIntakeModel(out, snapshot){

    safety_notes: String(src.safety_notes ?? ""),
    host_restriction: String(src.host_restriction ?? ""),
    special_requests: String(src.special_requests ?? src.requests ?? ""),
    activities: safeParseArray(src.activities, []),
    dietary_preferences: safeParseArray(src.dietary_preferences, []),
    allergies: safeParseArray(src.allergies, []),
    accommodation_pref: safeParseArray((src.accommodation_pref!==undefined && src.accommodation_pref!==null) ? src.accommodation_pref : src.accommodation, []),
    risk_flags: safeParseArray(src.risk_flags, [])

}

function formatApiError(out, fallbackLabel="unknown"){
  const err = (out && (out.error || out.code)) ? String(out.error || out.code) : "";
  const msg = (out && out.message) ? String(out.message) : "";
  if (err && msg) return `${err} — ${msg}`;
  if (msg) return msg;
  if (err) return err;
  return fallbackLabel;
}

function safeDateString(s){

  const d = new Date(iso);

/* ========= GDPR: unlinked messages cleanup ========= */
// Requires backend endpoints:
//  - POST /api/message/delete { id }
//  - POST /api/messages/unlinked/purge { days }

window.deleteUnlinkedMessage = async function(id){
  const mid = String(id||"").trim();
  if(!mid) return;
  if(!confirm("Dit bericht definitief verwijderen? (AVG)")) return;

  // Optimistic UI: remove locally immediately (snappy). If backend fails, reload from server.
  try{
    if(Array.isArray(state.messagesAll)) state.messagesAll = state.messagesAll.filter(x => String(x.id||"") !== mid);
    if(Array.isArray(state.messagesUnlinked)) state.messagesUnlinked = state.messagesUnlinked.filter(x => String(x.id||"") !== mid);
  }catch(e){}
  updateMessagesBadge();
  if(state.page==="messages") renderMessagesList();
  if(state.page==="messages") renderOverviewState("messages");

  const res = await apiFetch(API + "/message/delete", {
    method: "POST",
    headers: { "Content-Type":"application/json", "Accept":"application/json" },
    body: JSON.stringify({ id: mid })
  });

  const out = await res.json().catch(()=> ({}));
  if(!res.ok){
    alert("Verwijderen mislukt: " + formatApiError(out, String(res.status)));
    // Restore by reloading from server
    await loadMessagesUnlinked();
    if(state.page==="messages") renderMessagesList();
    return;
  }

  // Confirm by reloading (keeps list consistent with server)
  await loadMessagesUnlinked();
  if(state.page==="messages") renderMessagesList();
};

/* ========= SAFE fetch helpers ========= */

async function fetchJsonSafe(url, fallback){
  try{
    const res = await apiFetch(url, { headers: { "Accept":"application/json" }});
    const ct = (res.headers.get("content-type")||"").toLowerCase();
    if(!res.ok) return fallback;
    if(!ct.includes("application/json")) return fallback;
    return await res.json();
  }catch(err){
    return fallback;
  }
}
async function fetchArraySafe(url){
  const out = await fetchJsonSafe(url, []);
  return Array.isArray(out) ? out : [];
}

/* ========= services ========= */

function getActiveServices(){
  const list = (state.services||[]).filter(s => String(s.active ?? 1) !== "0");
  const seen = new Set();
  const out = [];
  for(const s of list){
    const nm = String(s?.name ?? "").trim();
    const key = nm.toLowerCase();
    if(!nm) continue;
    if(seen.has(key)) continue;
    seen.add(key);
    out.push(s);
  }
  return out;
}
function priceForService(name){
  const n=String(name??"").trim();
  const row=(state.services||[]).find(s => String(s.name??"").trim()===n);
  const p=parseInt(row?.client_price,10);
  return Number.isFinite(p)?p:0;
}
function serviceOptions(currentValue){
  const cur=String(currentValue??"").trim();
  const services=getActiveServices();
  const opts=[];
  opts.push(`<option value="">- kies dienst -</option>`);
  for(const s of services){
    const name=String(s.name??"").trim();
    if(!name) continue;
    const label=`${name} — ${euro(parseInt(s.client_price,10)||0)}`;
    const selected=(name===cur)?"selected":"";
    opts.push(`<option value="${escapeHtml(name)}" ${selected}>${escapeHtml(label)}</option>`);
  }
  if(cur && !services.some(s => String(s.name??"").trim()===cur)){
    opts.unshift(`<option value="${escapeHtml(cur)}" selected>${escapeHtml(cur)} (bestaand)</option>`);
  }
  return opts.join("");
}
async function loadServices(){
  state.services=[...FALLBACK_SERVICES];
  state.servicesSource="fallback";
  const data = await fetchArraySafe(API + "/services");
  if(Array.isArray(data) && data.length){

  }
}

/* ========= offer helpers ========= */

function clampExtraDays(n){ const x=toInt(n); return x<0?0:(x>EXTRA_DAY_MAX?EXTRA_DAY_MAX:x); }

function splitDescriptionAndMeta(desc){
  const raw=String(desc??"");
  const idx=raw.indexOf(META_MARKER);
  if(idx===-1) return { text: raw, meta: { groceries_service: 0 } };
  const text=raw.slice(0,idx);
  const metaStr=raw.slice(idx+META_MARKER.length);
  try{
    const meta=JSON.parse(metaStr);
    return { text, meta: { groceries_service: toBoolInt(meta?.groceries_service) } };
  }catch{
    return { text: raw, meta: { groceries_service: 0 } };
  }
}
function buildDescriptionWithMeta(text, meta){
  const clean=String(text??"").trimEnd();
  const safe={ groceries_service: toBoolInt(meta?.groceries_service) };
  return clean + META_MARKER + JSON.stringify(safe);
}

function computeOffer(){
  const serviceName=String(state.offer.service||state.form.service||"").trim();
  const base=priceForService(serviceName);
  const isAdventure=serviceName==="Adventure";
  const extraDays=isAdventure?clampExtraDays(state.offer.extra_days):0;
  const extraDaysCost=extraDays*EXTRA_DAY_PRICE_EUR;
  const groceries=state.offerMeta.groceries_service?GROCERIES_SERVICE_EUR:0;
  const late=toBoolInt(state.offer.late_arrival)?LATE_ARRIVAL_EUR:0;
  const pickupKm=toInt(state.offer.pickup_km);
  const overKm=Math.max(0,pickupKm-PICKUP_FREE_KM);
  const pickupCost=Math.round(overKm*PICKUP_RATE_EUR_PER_KM*100)/100;

  const lines=[];
  lines.push({label:`Basisdienst: ${serviceName||"-"}`,amount:base});
  if(extraDays>0) lines.push({label:`Extra dag(en): ${extraDays} × ${euro(EXTRA_DAY_PRICE_EUR)}`,amount:extraDaysCost});
  if(groceries) lines.push({label:`Boodschappenservice`,amount:groceries});
  if(late) lines.push({label:`Late arrival na 22:00`,amount:late});
  if(pickupCost>0) lines.push({label:`Pickup > ${PICKUP_FREE_KM} km: ${overKm} × €0,50`,amount:pickupCost});
  const total=lines.reduce((s,l)=>s+(Number(l.amount)||0),0);
  return { lines, total };
}

function renderOfferBox(){
  const o=computeOffer();
  const breakdown=o.lines.map(l=>`
    <div class="row">

        <div class="small">DB services niet bereikbaar. Keuze en prijzen werken wel (SOLO/Adventure/Remote).</div>

async function getMessagesHtml(intakeId){
  state.parsedLoggedById = {};
  const msgs = await fetchArraySafe(API + "/messages?intake_id=" + encodeURIComponent(intakeId));
  if(!msgs.length) return `<div class="small">Nog geen berichten.</div>`;

  return msgs.map(m=>{
    const src = String(m.source||"system");
    const parsed = parseLoggedMail(m.message);
    if(parsed && (src==="client_email" || src==="host_email")){
      state.parsedLoggedById[m.id] = parsed;
    }

    const title = parsed ? `${src} — ${parsed.subject||"(geen onderwerp)"}` : src;
    const preview = parsed ? (parsed.body||"") : (m.message||"");
    const short = String(preview).length>220 ? String(preview).slice(0,220)+"…" : String(preview);

    const pills = parsed
      ? `<span class="msgpill">${escapeHtml(parsed.to||"-")}</span>`
      : `<span class="msgpill">${escapeHtml(m.email||"-")}</span>`;

    const actions = (parsed && (src==="client_email" || src==="host_email"))
      ? `<div class="actions">
           <button class="smallbtn" onclick="reuseLoggedMail('${escapeHtml(m.id)}')">Opnieuw klaarzetten</button>
           <button class="smallbtn" onclick="copyToClipboard(buildMailBlock(${JSON.stringify(parsed.to)}, ${JSON.stringify(parsed.subject)}, ${JSON.stringify(parsed.body)}))">Kopieer</button>
         </div>`
      : ``;

    return `
      <div class="item">
        <div class="small">${new Date(m.created_at||m.received_date||Date.now()).toLocaleString()}</div>
        <b>${escapeHtml(title)}</b><br>
        ${pills}
        <div class="small" style="white-space:pre-wrap;margin-top:.35rem">${escapeHtml(short)}</div>
        ${actions}
      </div>
    `;
  }).join("");
}

  if(!payload.name){

  const url = isNew ? API + "/hosts/create" : API + "/hosts/update";
  const res = await apiFetch(url, {
    method: "POST",
    headers: { "Content-Type":"application/json", "Accept":"application/json" },
    body: JSON.stringify(payload)
  });
  const out = await res.json().catch(()=> ({}));
  if(!res.ok){
    alert("Host opslaan mislukt: " + formatApiError(out, String(res.status)));
    return;

  await loadHostsDb();
  renderHostPage();

window.deleteHostRecord = async function(){
  const h = state.currentHost || {};
  const id = String(h.id || "").trim();
  if(!id) return;

  if(!confirm("Host veilig verwijderen/deactiveren? Dit mag alleen als alle gekoppelde betalingen afgerond zijn.")) return;

  const res = await apiFetch(API + "/hosts/delete", {
    method: "POST",
    headers: { "Content-Type":"application/json", "Accept":"application/json" },
    body: JSON.stringify({ id })
  });
  const out = await res.json().catch(()=> ({}));
  if(!res.ok){
    const err = formatApiError(out, String(res.status));
    if(String(out.error||"") === "open_host_payouts"){
      alert(`Host kan nog niet verwijderd worden: er zijn nog open host payouts (${toInt(out.count)}).`);
      return;

    if(String(out.error||"") === "open_cases_or_unpaid_customer"){
      alert(`Host kan nog niet verwijderd worden: er zijn nog open/onbetaalde cases (${toInt(out.count)}).`);
      return;

    alert("Host verwijderen mislukt: " + err);
    return;

  await loadHostsDb();
  renderHostPage();
  renderOverviewState("host");
  alert("Host is veilig gedeactiveerd ✅");
};

function hostRenderPayoutSummary(payout){
  const rows = Array.isArray(payout?.breakdown) ? payout.breakdown : [];

  const statusLabel = latestStatus ? latestStatus : (payout?.total ? "open" : "-");
  return `
    <div class="breakdown">
      <div class="row"><div>Status</div><div class="amt">${escapeHtml(statusLabel)}</div></div>
      ${rows.length ? rows.map(r=>`
        <div class="row">
          <div>${escapeHtml(String(r.desc || "Payout regel"))}</div>
          <div class="amt">${escapeHtml(eur2(Number(r.amount||0)))}</div>

function hostRenderPayoutPaymentInfo(latest){
  const row = latest || {};
  const paidAt = formatDateNL(String(row.paid_at||"").slice(0,10)) || "-";
  const method = String(row.payment_method || "").trim() || "-";
  const ref = String(row.payment_reference || "").trim();
  const note = String(row.note || "").trim();
  return `
    <div class="breakdown" style="margin-top:.55rem">
      <div class="row"><div>Betaald op</div><div class="amt">${escapeHtml(paidAt)}</div></div>

      ${ref ? `<div class="row"><div>Referentie</div><div class="amt">${escapeHtml(ref)}</div></div>` : ``}
      ${note ? `<div class="row"><div>Notitie</div><div class="amt">${escapeHtml(note)}</div></div>` : ``}
    </div>
  `;
}

function hostExpenseCategoryNorm(v){
  const s = String(v||"").trim().toLowerCase();
  if(s === "meal" || s === "meals" || s === "lunch") return "meals";
  if(s === "uber" || s === "transport" || s === "taxi") return "uber";
  if(s === "other" || s === "overig") return "other";
  return s || "other";
}

function hostSumReimbursement(expenses, cat){
  const wanted = hostExpenseCategoryNorm(cat);
  return round2((expenses||[])
    .filter(x => hostExpenseCategoryNorm(x.category) === wanted && toBoolInt(x.reimbursable))
    .reduce((s,x)=>s+amountCentsToEurNumber(x.amount_cents),0));
}

function hostRenderReimbursementItems(expenses, cat){
  const wanted = hostExpenseCategoryNorm(cat);
  const list = (expenses||[]).filter(x => hostExpenseCategoryNorm(x.category) === wanted);
  if(!list.length) return `<div class="small">Geen bonnen.</div>`;

  return `
    <div class="breakdown">
      ${list.map(x=>{
        const amt = amountCentsToEurNumber(x.amount_cents);
        const desc = String(x.description || payoutExpenseCategoryLabel(x.category) || "Bon").trim();
        const paidBy = String(x.paid_by || "-").trim();
        const receipt = toBoolInt(x.receipt_received) ? "✓ bon ontvangen" : "○ bon ontbreekt";
        const reimb = toBoolInt(x.reimbursable) ? "✓ terugbetalen" : "○ niet terugbetalen";
        const url = String(x.receipt_url || "").trim();
        const note = String(x.note || "").trim();
        return `
          <div class="row">
            <div>
              <b>${escapeHtml(desc)}</b><br>
              <span class="small">Betaald door: ${escapeHtml(paidBy)} · ${escapeHtml(receipt)} · ${escapeHtml(reimb)}</span>
              ${url ? `<div class="small">Bon URL: ${escapeHtml(url)}</div>` : ``}
              ${note ? `<div class="small" style="white-space:pre-wrap;margin-top:.15rem">${escapeHtml(note)}</div>` : ``}
            </div>
            <div class="amt">${escapeHtml(eur2(amt))}</div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

/* ===== BTW settlement helpers (read-only status) =====
   Let op: UI blijft standaard 21% rekenen voor normale kosten.
   Settlement boekingen (Belastingdienst) tellen niet mee als 'btw op kosten'.
*/
function isVatSettlementTemplate(tpl){
  const cat = String(tpl?.category||"").toLowerCase();
  const desc = String(tpl?.description||"").toLowerCase();
  const sup = String(tpl?.supplier||"").toLowerCase();
  if(cat.includes("belasting") || sup.includes("belasting") || desc.includes("belastingdienst")){
    if(desc.includes("btw") || cat.includes("btw")) return true;
  }
  if(desc.includes("btw afdracht") || desc.includes("btw teruggaaf") || desc.includes("vat payment") || desc.includes("vat refund")) return true;
  return false;
}
function isVatSettlementEntry(e){
  const tpl = overheadTemplateById(e?.overhead_id);
  if(tpl && isVatSettlementTemplate(tpl)) return true;
  const note = String(e?.note||"").toLowerCase();
  return note.includes("btw afdracht") || note.includes("btw teruggaaf") || note.includes("belastingdienst");
}
function sumVatCentsExcludingSettlement(entries){
  const rows = Array.isArray(entries) ? entries : [];
  let vat = 0;
  for(const e of rows){
    if(isVatSettlementEntry(e)) continue;
    vat += toInt(e?.vat_cents);
  }
  return vat;
}
function sumSettlementInclCents(entries){
  const rows = Array.isArray(entries) ? entries : [];
  let paid = 0;
  let received = 0;
  for(const e of rows){
    if(!isVatSettlementEntry(e)) continue;
    const incl = toInt(e?.amount_excl_cents) + toInt(e?.vat_cents);
    const tpl = overheadTemplateById(e?.overhead_id) || {};
    const hay = (String(tpl.category||"") + " " + String(tpl.description||"") + " " + String(tpl.supplier||"") + " " + String(e?.note||"")).toLowerCase();
    if(hay.includes("terug") || hay.includes("refund") || hay.includes("ontvang")) received += incl;
    else paid += incl;
  }
  return { paid, received };
}
function computeAutoVatFromIncl(incl){
  const total = Math.max(0, parseEuroInput(incl));
  const rate = Math.max(0, getOverheadVatRate());
  if(rate === 0) return 0;
  return roundMoney(total - (total / (1 + rate)));
}
function updateOverheadDerivedFields(){
  try{
    const d = state.overheadDraft || {};
    const incl = Math.max(0, parseEuroInput(d.amount_incl));
    const vat = computeAutoVatFromIncl(d.amount_incl);
    const excl = roundMoney(Math.max(0, incl - vat));

    const vatEl = document.getElementById('overheadVatAuto');
    if(vatEl) vatEl.value = String(vat.toFixed(2)).replace('.', ',');

    const exclEl = document.getElementById('overheadExclPreview');

function monthLabelNL(ym){
  const m = String(ym||"").match(/^(\d{4})-(\d{2})$/);
  if(!m) return String(ym||"");
  const d = new Date(parseInt(m[1],10), parseInt(m[2],10)-1, 1);
  // Example: "april 2026"
  try{ return d.toLocaleString("nl-NL", { month:"long", year:"numeric" }); }catch{ return ym; }
}
function buildMonthPickerOptions(currentFrom, currentTo){
  // Build a sensible list around "now": past 24 months + next 12 months.
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth()-24, 1);
  const end = new Date(now.getFullYear(), now.getMonth()+12, 1);

  const set = new Set();
  // Ensure current selections are always present
  const cf = normalizeMonthInput(currentFrom);
  const ct = normalizeMonthInput(currentTo);
  if(cf) set.add(cf);
  if(ct) set.add(ct);

  // Also include currently loaded months from range cache (if any)
  try{
    const months = Array.isArray(state?.overheadRangeCache?.months) ? state.overheadRangeCache.months : [];
    for(const m of months) if(normalizeMonthInput(m)) set.add(normalizeMonthInput(m));
  }catch(e){}

  // Fill the rolling window
  const cur = new Date(start.getTime());
  while(cur.getTime() <= end.getTime()){
    const ym = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
    set.add(ym);
    cur.setMonth(cur.getMonth()+1);
  }

  // Sort ascending
  return Array.from(set).sort((a,b)=>a.localeCompare(b));
}
function monthListboxHtml(id, value, onChangeJs){
  const v = normalizeMonthInput(value);
  const opts = buildMonthPickerOptions(state.overheadRangeFrom, state.overheadRangeTo);
  return `
    <select id="${escapeHtml(id)}" size="8" onchange="${escapeHtml(onChangeJs)}" style="width:100%">
      ${opts.map(m=>{
        const sel = (m===v) ? "selected" : "";
        return `<option value="${escapeHtml(m)}" ${sel}>${escapeHtml(monthLabelNL(m))}</option>`;
      }).join("")}
    </select>
  `;
}
function monthsBetweenInclusive(from, to){
  const a = normalizeMonthInput(from);
  const b = normalizeMonthInput(to);
  if(!a || !b) return [];
  // ensure order
  const [ay, am] = a.split('-').map(x=>parseInt(x,10));
  const [by, bm] = b.split('-').map(x=>parseInt(x,10));
  let start = new Date(ay, am-1, 1);
  let end = new Date(by, bm-1, 1);
  if(start.getTime() > end.getTime()){
    const tmp = start; start = end; end = tmp;
  }
  const out = [];
  const cur = new Date(start.getTime());
  while(cur.getTime() <= end.getTime()){
    out.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`);
    cur.setMonth(cur.getMonth()+1);
  }
  return out;
}

async function fetchOverheadEntriesRange(fromMonth, toMonth){
  const months = monthsBetweenInclusive(fromMonth, toMonth);
  if(!months.length) return { months: [], entries: [], summary: { amount_excl_cents:0, vat_cents:0, amount_incl_cents:0 } };
  if(months.length === 1){
    const out = await fetchOverheadEntries(months[0]);
    return { months, entries: out.entries, summary: out.summary };
  }
  // Range: fetch per month (API supports month filter only)
  const results = await Promise.all(months.map(m => fetchOverheadEntries(m).catch(()=>({ entries:[], summary:{ amount_excl_cents:0, vat_cents:0, amount_incl_cents:0 } }))));
  const entries = [];
  let sumExcl = 0, sumVat = 0, sumIncl = 0;
  for(const r of results){
    const ee = Array.isArray(r?.entries) ? r.entries : [];
    for(const e of ee) entries.push(e);
    const s = r?.summary || {};
    sumExcl += toInt(s.amount_excl_cents);
    sumVat  += toInt(s.vat_cents);
    sumIncl += toInt(s.amount_incl_cents);
  }
  return { months, entries, summary: { amount_excl_cents: sumExcl, vat_cents: sumVat, amount_incl_cents: sumIncl } };
}

window.bookVatSettlement = function(kind, amount, rangeLabel){
  // kind: 'paid' (afdracht) or 'received' (teruggaaf)
  const a = Number(amount || 0);
  if(!Number.isFinite(a) || a <= 0){
    alert("Geen openstaand BTW-bedrag om te boeken.");
    return;
  }

  const todayIso = new Date().toISOString().slice(0,10);
  const label = String(rangeLabel||"").trim();
  const note = (kind === "received")
    ? `BTW teruggaaf ontvangen (${label || "periode"})`
    : `BTW afdracht Belastingdienst (${label || "periode"})`;

  // Set draft (losse boeking). Save gebeurt pas als je op 'Opslaan overheadboeking' klikt.
  state.overheadDraft.edit_id = "";
  state.overheadDraft.overhead_id = ""; // losse boeking (geen template vereist)
  state.overheadDraft.category = "";
  state.overheadDraft.description = "";
  state.overheadDraft.supplier = "";
  state.overheadDraft.entry_date = todayIso;
  state.overheadDraft.amount_incl = String(a.toFixed(2)).replace(".", ",");
  state.overheadDraft.vat = "0,00"; // settlement => VAT = 0
  state.overheadDraft.note = note;

  // Populate existing form fields directly (avoid async re-render confusion)
  const dateEl = document.getElementById("overheadEntryDate");
  const inclEl = document.getElementById("overheadAmountIncl");
  const noteEl = document.getElementById("overheadNote");
  const tplEl  = document.getElementById("overheadTemplateSelect");

  if(tplEl) tplEl.value = "";
  if(dateEl) dateEl.value = formatDateNL(todayIso);
  if(inclEl) inclEl.value = state.overheadDraft.amount_incl;

window.saveOverheadEntry = async function(){
  const d = state.overheadDraft || {};
    let computedVat = computeAutoVatFromIncl(d.amount_incl);
  let computedExcl = roundMoney(Math.max(0, parseEuroInput(d.amount_incl) - computedVat));

  // BTW settlement (Belastingdienst): force VAT=0 and excl=incl
  try{
    const noteHay = String(d.note||'').toLowerCase();
    const tpl = overheadTemplateById(d.overhead_id);
    const isSettlement = isVatSettlementTemplate(tpl) || noteHay.includes('btw afdracht') || noteHay.includes('btw terug') || noteHay.includes('teruggaaf') || noteHay.includes('belastingdienst');
    if(isSettlement){
      const incl = Math.max(0, parseEuroInput(d.amount_incl));
      computedVat = 0;
      computedExcl = roundMoney(incl);
    }
  }catch(e){}
  const payload = {
    id: String(d.edit_id||'').trim(),
    overhead_id: String(d.overhead_id||'').trim(),
    entry_date: String(normalizeNlDateInput(d.entry_date)||'').trim(),
    amount_excl: String(computedExcl).replace('.', ','),
    vat: String(computedVat.toFixed(2)).replace('.', ','),
    note: String(d.note||'').trim()
  };
  const url = payload.id ? API + "/overhead/update" : API + "/overhead/add";
  const res = await apiFetch(url, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
    body: JSON.stringify(payload)
  });
  const out = await res.json().catch(()=> ({}));
  if(!res.ok){
    alert('Overheadboeking opslaan mislukt: ' + formatApiError(out, String(res.status)));
    return;
  }
  const savedMonth = monthFromDateInput(payload.entry_date);
  if(savedMonth){
    state.overheadMonth = savedMonth;
  }
  state.overheadDraft = { edit_id:'', overhead_id:'', category:'', description:'', supplier:'', amount_incl:'', vat:'', entry_date:new Date().toISOString().slice(0,10), note:'' };
  alert(payload.id ? 'Overheadboeking bijgewerkt ✅' : 'Overheadboeking opgeslagen ✅');
  await renderOverheadPage();
};

function monthFromAnyDate(v){
  const s = String(v || '').trim();
  if(!s) return '';
  const m = s.match(/^(\d{4}-\d{2})/);
  if(m) return m[1];
  const iso = s.includes(' ') ? s.replace(' ', 'T') : s;
  const d = new Date(iso);
  if(isNaN(d.getTime())) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function caseFallsInMonth(c, month){
  const target = String(month || '').trim();
  if(!target) return true;
  const candidates = [
    c.invoice_paid_at,
    c.invoice_date,
    c.invoice_generated_at,
    c.updated_at,
    c.created_at,
    c.arrival_date
  ];
  return candidates.some(v => monthFromAnyDate(v) === target);
}

async function buildOverheadSummary(month){
  const cases = Array.isArray(state.cases) ? state.cases : [];
  const paidCases = cases.filter(c =>
    String(c.invoice_paid || "no").toLowerCase() === "yes" &&
    String(c.invoice_number || "").trim() &&
    caseFallsInMonth(c, month)
  );

  let revenueIncl = 0;
  let revenueExcl = 0;
  let revenueVat = 0;
  let payoutTotal = 0;
  let payoutPaid = 0;
  let payoutOpen = 0;
  let uber = 0;
  let meals = 0;
  let other = 0;

  for(const c of paidCases){
    const invoiceCalc = computeFinanceInvoiceFromCase(c);
    revenueIncl += Number(invoiceCalc.incl || 0);
    revenueExcl += Number(invoiceCalc.excl || 0);
    revenueVat += Number(invoiceCalc.vat || 0);

    let payoutData = { payouts: [], costs: [] };
    try{ payoutData = await fetchPayoutsForCase(c.id); }catch{}

    const payoutSummary = summarizeHostPayout(payoutData);
    const costSummary = summarizeFinanceCosts(payoutData);

    payoutTotal += Number(payoutSummary.total || 0);
    const payoutRows = Array.isArray(payoutData?.payouts) ? payoutData.payouts : [];
    const latest = payoutRows.length ? payoutRows[0] : null;
    const latestStatus = String(latest?.status || "pending");
    if(Number(payoutSummary.total || 0) > 0){
      if(latestStatus === "paid") payoutPaid += Number(payoutSummary.total || 0);
      else payoutOpen += Number(payoutSummary.total || 0);
    }

    uber += Number(costSummary.uber || 0);
    meals += Number(costSummary.meals || 0);
    other += Number(costSummary.other || 0);
  }

  const internalCosts = round2(uber + meals + other);
  const totalBusinessCosts = round2(payoutTotal + internalCosts);
  const margin = round2(revenueExcl - totalBusinessCosts);
  const costRatio = revenueExcl > 0 ? round2((totalBusinessCosts / revenueExcl) * 100) : 0;
  const marginRatio = revenueExcl > 0 ? round2((margin / revenueExcl) * 100) : 0;

  return {
    month: String(month || ''),
    paidInvoiceCount: paidCases.length,
    revenueIncl: round2(revenueIncl),
    revenueExcl: round2(revenueExcl),
    revenueVat: round2(revenueVat),
    payoutTotal: round2(payoutTotal),
    payoutPaid: round2(payoutPaid),
    payoutOpen: round2(payoutOpen),
    uber: round2(uber),
    meals: round2(meals),
    other: round2(other),
    internalCosts,
    totalBusinessCosts,
    margin,
    costRatio,
    marginRatio
  };
}

/* ========= offer builder ========= */

function clampExtraDays(n){ const x=toInt(n); return x<0?0:(x>EXTRA_DAY_MAX?EXTRA_DAY_MAX:x); }

function splitDescriptionAndMeta(desc){
  const raw=String(desc??"");
  const idx=raw.indexOf(META_MARKER);
  if(idx===-1) return { text: raw, meta: { groceries_service: 0 } };
  const text=raw.slice(0,idx);
  const metaStr=raw.slice(idx+META_MARKER.length);
  try{
    const meta=JSON.parse(metaStr);
    return { text, meta: { groceries_service: toBoolInt(meta?.groceries_service) } };
  }catch{
    return { text: raw, meta: { groceries_service: 0 } };
  }
}
function buildDescriptionWithMeta(text, meta){
  const clean=String(text??"").trimEnd();
  const safe={ groceries_service: toBoolInt(meta?.groceries_service) };
  return clean + META_MARKER + JSON.stringify(safe);
}

function computeOffer(){
  const serviceName=String(state.offer.service||state.form.service||"").trim();
  const base=priceForService(serviceName);
  const isAdventure=serviceName==="Adventure";
  const extraDays=isAdventure?clampExtraDays(state.offer.extra_days):0;
  const extraDaysCost=extraDays*EXTRA_DAY_PRICE_EUR;
  const groceries=state.offerMeta.groceries_service?GROCERIES_SERVICE_EUR:0;
  const late=toBoolInt(state.offer.late_arrival)?LATE_ARRIVAL_EUR:0;
  const pickupKm=toInt(state.offer.pickup_km);
  const overKm=Math.max(0,pickupKm-PICKUP_FREE_KM);
  const pickupCost=Math.round(overKm*PICKUP_RATE_EUR_PER_KM*100)/100;

  const lines=[];
  lines.push({label:`Basisdienst: ${serviceName||"-"}`,amount:base});
  if(extraDays>0) lines.push({label:`Extra dag(en): ${extraDays} × ${euro(EXTRA_DAY_PRICE_EUR)}`,amount:extraDaysCost});
  if(groceries) lines.push({label:`Boodschappenservice`,amount:groceries});
  if(late) lines.push({label:`Late arrival na 22:00`,amount:late});
  if(pickupCost>0) lines.push({label:`Pickup > ${PICKUP_FREE_KM} km: ${overKm} × €0,50`,amount:pickupCost});
  const total=lines.reduce((s,l)=>s+(Number(l.amount)||0),0);
  return { lines, total };
}

function renderOfferBox(){
  const o=computeOffer();
  const breakdown=o.lines.map(l=>`
    <div class="row">
      <div>${escapeHtml(l.label)}</div>
      <div class="amt">${escapeHtml(euro(l.amount))}</div>
    </div>
  `).join("");
  return `
    ${state.servicesSource==="db" ? "" : `
      <div class="banner">
        <strong>ℹ️ Diensten via fallback</strong>
        <div class="small">DB services niet bereikbaar. Keuze en prijzen werken wel (SOLO/Adventure/Remote).</div>

    <div class="kpi"><div class="small">Totaal</div><b>${escapeHtml(euro(o.total))}</b></div>

    </div>

}

function getHostNameForCase(out){
  try{
    const hid = out?.host_id;
    if(hid===null || hid===undefined || hid==="") return "";
    const id = String(hid);
    const h = (state.hostsDb||[]).find(x=>String(x.id)===id);
    return String(h?.name||"").trim();
  }catch{ return ""; }
}
function financeReplacePlaceholders(text, out){
  let t = String(text||"");
  const kim = String(out?.kim_id||"").trim();
  const hostName = getHostNameForCase(out);
  const clientName = String(out?.client_name||out?.name||"").trim();
  const service = String(out?.service||"").trim();
  const arrival = String(out?.arrival_date||"").trim();

  if(kim) t = t.replaceAll("[factuurnummer]", kim).replaceAll("[booking_reference]", kim);
  if(clientName) t = t.replaceAll("[naam]", clientName);
  if(service) t = t.replaceAll("[dienst]", service);
  if(arrival) t = t.replaceAll("[datum_opdracht]", arrival);
  if(hostName) t = t.replaceAll("[host_name]", hostName);
  return t;
}

function buildMailBlock(to, subject, body){
  return `To: ${String(to||"")}\nSubject: ${String(subject||"")}\n---\n${String(body||"")}`;
}
function parseLoggedMail(message){
  const raw = String(message||"");
  const mTo = raw.match(/^To:\s*(.*)$/m);
  const mSub = raw.match(/^Subject:\s*(.*)$/m);
  const idx = raw.indexOf("\n---\n");
  if(!mTo || !mSub || idx === -1) return null;
  const body = raw.slice(idx + "\n---\n".length);
  return { to: mTo[1] ?? "", subject: mSub[1] ?? "", body: body ?? "" };
}
function setComposeFromTemplate(){
  const aud = String(state.templates.audience||"client_nl");
  const subject = currentTemplateSubject();
  const body = renderTemplateText();

  let to = "";
  let source = "client_email";

  if(aud === "host_en"){
    const host = getSelectedHost();
    to = String(host?.email||"").trim();
    source = "host_email";
  } else {
    to = String(state.form?.email||"").trim();
    source = "client_email";
  }
  state.compose = { to, subject, body, source };
}
window.onComposeChange = (field, value) => { state.compose[field] = value; };

function mailtoHref(to, subject, body){
  const t = encodeURIComponent(String(to||""));
  const s = encodeURIComponent(String(subject||""));
  const b = encodeURIComponent(String(body||""));
  return `mailto:${t}?subject=${s}&body=${b}`;
}
window.openMailClient = () => {
  const c = state.compose || {};
  window.location.href = mailtoHref(c.to, c.subject, c.body);
};
window.copyComposedMail = async () => {
  const c = state.compose || {};
  await copyToClipboard(buildMailBlock(c.to, c.subject, c.body));
};
window.logComposedMail = async () => {
  if(!state.currentIntake?.id){
    alert("Geen intake geselecteerd.");
    return;
  }
  const c = state.compose || {};
  const payload = {
    intake_id: state.currentIntake.id,
    source: c.source || "client_email",
    to: c.to || "",
    subject: c.subject || "",
    body: c.body || ""
  };

  const res = await apiFetch(API + "/message/log",{
    method:"POST",
    headers:{ "Content-Type":"application/json", "Accept":"application/json" },
    body: JSON.stringify(payload)
  });
  const out = await res.json().catch(()=> ({}));
  if(!res.ok){
    alert("Loggen mislukt: " + formatApiError(out, String(res.status)));
    return;
  }
  alert("Geloggd ✅");
  await renderIntakeRightPanel(state.currentIntake.id);
};
window.reuseLoggedMail = (msgId) => {
  const parsed = state.parsedLoggedById[msgId];
  if(!parsed) return;
  state.compose.to = parsed.to;
  state.compose.subject = parsed.subject;
  state.compose.body = parsed.body;
  renderIntakeRightPanel(state.currentIntake.id);
};

function riskLevelOptions(cur){
  const v=String(cur??"").trim();
  return RISK_LEVELS.map(([code,label])=>{
    const sel=(code===v)?"selected":"";
    return `<option value="${escapeHtml(code)}" ${sel}>${escapeHtml(label)}</option>`;
  }).join("");
}

function toggleMulti(field, value, checked){
  const cur = Array.isArray(state.form[field]) ? [...state.form[field]] : [];
  const set = new Set(cur);
  const noneValue="Geen";
  const enforceNone=(field==="dietary_preferences"||field==="allergies");

  if(enforceNone){
    if(value===noneValue && checked){ set.clear(); set.add(noneValue); }
    else if(value!==noneValue && checked){ set.delete(noneValue); set.add(value); }
    else if(!checked){ set.delete(value); }
  } else {
    if(checked) set.add(value); else set.delete(value);
  }
  state.form[field]=[...set];
}
function renderCheckboxList(field, options){
  const selected = Array.isArray(state.form[field]) ? state.form[field] : [];
  return `
    <div class="checkgrid">
      ${options.map(opt=>{
        const checked = selected.includes(opt) ? "checked" : "";
        return `<label><input type="checkbox" ${checked} onchange="toggleMulti('${escapeHtml(field)}','${escapeHtml(opt)}',this.checked); renderIntakeDetail();"><span>${escapeHtml(opt)}</span></label>`;
      }).join("")}
    </div>
    <div class="inline">
      <input class="custom-entry-input" style="flex:1;min-width:160px" placeholder="Anders (typ & enter)" onkeydown="if(event.key==='Enter'){event.preventDefault(); addCustom('${escapeHtml(field)}', this.value); this.value='';}">
      <span class="small">Voeg extra optie toe</span>
    </div>
  `;
}
window.addCustom=function(field, raw){
  const v=String(raw||"").trim();
  if(!v) return;
  toggleMulti(field, v, true);
  renderIntakeDetail();
};
function renderPills(arr){
  const a=Array.isArray(arr)?arr:[];
  if(!a.length) return `<span class="pill">-</span>`;
  return a.map(x=>`<span class="pill selected-pill">${escapeHtml(x)}</span>`).join(" ");
}

      saveCaseIntake();
      return;
    }
    if(action === "case-addresses-save"){
      ev.preventDefault();
      saveCaseAddresses();

    }
    if(action === "case-snapshot-mode"){
      ev.preventDefault();
      const mode = String(btn.dataset.mode||"");

      return;
    }
  };

  if(middle && middle.dataset.journeyDelegated !== "1"){

async function saveOffer(){
  if(!state.currentIntake?.id) return;
  const serviceName=String(state.offer.service||state.form.service||"SOLO").trim();
  const extraDays=(serviceName==="Adventure")?clampExtraDays(state.offer.extra_days):0;
  const description=buildDescriptionWithMeta(state.offer.description_text||"", state.offerMeta);

  await apiFetch(API+"/intake/offer",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id: state.currentIntake.id,
      service: serviceName,
      extra_days: extraDays,
      pickup_km: toInt(state.offer.pickup_km),
      late_arrival: toBoolInt(state.offer.late_arrival),
      description
    })
  });
}
async function saveOfferAndRefresh(){
  if(state.currentIntake?.id){
    await saveOffer();
    alert("Offerte opgeslagen");
    await refreshAll();
    if(state.currentIntake?.id) openIntake(state.currentIntake.id);
    return;
  }

  if(state.currentCase?.id && state.currentCase?.intake_id){
    await ensureBookingNumberForCase();
    const prev = state.currentIntake;
    state.currentIntake = { id: state.currentCase.intake_id };
    try{
      await saveOffer();
    } finally {
      state.currentIntake = prev;
    }
    alert("Offerte opgeslagen");
    await refreshAll();
    if(state.currentCase?.id) await openCase(state.currentCase.id);
    return;
  }
}

function openIntake(id){
  const item = state.intakes.find(i=>i.id===id);
  if(!item) return;

  state.currentIntake = item;
  state.currentCase = null;
  state.currentMessage = null;

  state.form={
    ...item,
    status: item.status ?? "new",
    activities:safeParseArray(item.activities, []),
    dietary_preferences:safeParseArray(item.dietary_preferences, []),
    allergies:safeParseArray(item.allergies, []),
    accommodation_pref:safeParseArray(item.accommodation_pref, []),
    risk_flags:safeParseArray(item.risk_flags, [])
  };

  const d=splitDescriptionAndMeta(item.offer_description||"");

  state.offer={
    service: chosenService,

function journeyStatusNorm(status){
  const s = normalizeKey(status || "planned");
  if(!s) return "planned";
  if(["done","completed","complete","afgerond"].includes(s)) return "completed";
  if(["phase_1","offerte_akkoord","quote_accepted","accepted","akkoord"].includes(s)) return "phase_1";
  if(["handed_to_host","host_execution","in_execution","bij_host","host"].includes(s)) return "handed_to_host";
  if(["cancelled","canceled","geannuleerd"].includes(s)) return "cancelled";
  if(["confirmed","active","planned","new"].includes(s)) return s === "new" ? "planned" : s;
  return s;
}
function journeyBucket(status){
  const s = journeyStatusNorm(status);
  if(["phase_1"].includes(s)) return "accepted";
  if(["handed_to_host","host_execution","in_execution"].includes(s)) return "host";
  if(["completed","done"].includes(s)) return "done";
  if(["cancelled"].includes(s)) return "cancelled";
  return "active";
}
function journeyStatusLabel(status){
  const s = journeyStatusNorm(status);
  const labels = {
    planned:"Actief",
    active:"Actief",
    confirmed:"Bevestigd",
    phase_1:"Offerte akkoord",
    handed_to_host:"Bij host",
    completed:"Afgerond",
    cancelled:"Geannuleerd"
  };
  return labels[s] || s;
}
function journeyStatusPill(status){
  const bucket = journeyBucket(status);
  const cls = bucket === "host" ? "host" : (bucket === "accepted" ? "accepted" : (bucket === "done" ? "done" : (bucket === "cancelled" ? "cancelled" : "active")));
  return `<span class="journey-status-pill ${cls}">${escapeHtml(journeyStatusLabel(status))}</span>`;
}

function applyCaseFilters(list){
  const f = state.caseFilters || {};
  const q = normalizeKey(f.q);
  const status = normalizeKey(f.status);
  const lead = normalizeKey(f.lead_type);
  const service = String(f.service||"").trim();
  const view = String(f.view || "active");

  return (list||[]).filter(c=>{
    const bucket = journeyBucket(c.status);
    if(view === "active" && bucket !== "active") return false;
    if(view === "accepted" && bucket !== "accepted") return false;
    if(view === "host" && bucket !== "host") return false;
    if(view === "done" && bucket !== "done") return false;
    if(view !== "all" && bucket === "cancelled") return false;

    if(status){
      const cs = journeyStatusNorm(c.status);
      const wanted = journeyStatusNorm(status);
      if(cs !== wanted) return false;
    }
    if(service){
      const s = String(c.service||"").trim();
      if(s !== service) return false;
    }
    if(lead){
      const lt = normalizeKey(c.lead_type);
      if(lt !== lead) return false;
    }
    if(q){
      const hay = [
        c.client_name, c.client_email, c.client_phone,
        c.service, c.status, c.lead_type, c.id, c.kim_id
      ].map(x=>normalizeKey(x)).join(" ");
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

const CASE_STATUSES = [["planned","Actief"],["phase_1","Offerte akkoord"],["handed_to_host","Bij host"],["completed","Afgerond"],["cancelled","Geannuleerd"]];
function caseStatusOptions(cur){
  const v=normalizeKey(cur);
  return CASE_STATUSES.map(([code,label])=>{
    const sel=(normalizeKey(code)===v)?"selected":"";
    return `<option value="${escapeHtml(code)}" ${sel}>${escapeHtml(label)}</option>`;
  }).join("");
}

function toDisplayScalar(v){
  if(v === null || v === undefined) return "";
  if(typeof v === "string" || typeof v === "number" || typeof v === "boolean") return String(v);
  if(typeof v === "object"){
    if(typeof v.name === "string") return v.name;
    if(typeof v.value === "string") return v.value;
    try{ return JSON.stringify(v); }catch{ return "[object]"; }
  }
  return String(v);
}
function renderKV(k,v){
  const val = toDisplayScalar(v);
  const show = (String(val).trim()==="") ? "-" : val;
  return `<div class="k">${escapeHtml(k)}</div><div class="v">${escapeHtml(show)}</div>`;
}
function renderSnapshotPills(v){
  const arr = safeParseArray(v, []);
  if(!arr.length) return `<span class="pill">-</span>`;
  return arr.map(x=>`<span class="pill">${escapeHtml(x)}</span>`).join(" ");
}

async function openCase(caseId){
  const res = await apiFetch(API+"/case/get?id="+encodeURIComponent(caseId), { headers: { "Accept":"application/json" }});
  const ct=(res.headers.get("content-type")||"").toLowerCase();
  const out = ct.includes("application/json") ? await res.json().catch(()=> ({})) : {};
  if(!res.ok){
    document.getElementById("middleDetail").innerHTML = `<div class="small">Journey laden mislukt: ${escapeHtml(formatApiError(out, String(res.status)))}</div>`;
    document.getElementById("rightContent").innerHTML = `<div class="small">-</div>`;
    return;
  }

  const snapshot = safeParseObj(out.snapshot) || safeParseObj(out.intake_snapshot) || null;
  state.caseIntake = buildCaseIntakeModel(out, snapshot);

  state.currentCase = out;
  state.caseSnapshotMode = 'live';
  state.currentIntake = null;
  state.currentMessage = null;

  state.caseForm = {
    id: out.id,
    status: out.status ?? "planned",
    notes: out.notes ?? "",
    host_id: (out.host_id === null || out.host_id === undefined) ? "" : String(out.host_id),
    kim_id: String(out.kim_id ?? ""),
    home_address_text: String(out.home_address_text ?? ""),
    stay_address_text: String(out.stay_address_text ?? ""),
    stay_place_name: String(out.stay_place_name ?? ""),
    checkin_date: String(out.checkin_date ?? ""),
    maps_link: String(out.maps_link ?? "")
  };

  state.caseHostEdit = {
    id: (out.host_id === null || out.host_id === undefined) ? "" : String(out.host_id),
    name: String(out.host_name || "").trim(),
    email: String(out.host_email || "").trim(),
    phone: String(out.host_phone || "").trim(),
    level: String(out.host_level || "").trim() || "standard"
  };

  document.getElementById("middleDetail").innerHTML = renderCaseDetail(out, snapshot);
  document.getElementById("rightContent").innerHTML = renderCaseRightPanel(out);
  loadPayoutsForCase(out.id);
}

window.toggleCaseIntakeMulti = (field, value, checked)=>{
  const cur = Array.isArray(state.caseIntake[field]) ? [...state.caseIntake[field]] : [];
  const set = new Set(cur);
  const noneValue="Geen";
  const enforceNone=(field==="dietary_preferences"||field==="allergies");
  if(enforceNone){
    if(value===noneValue && checked){ set.clear(); set.add(noneValue); }
    else if(value!==noneValue && checked){ set.delete(noneValue); set.add(value); }
    else if(!checked){ set.delete(value); }
  } else {
    if(checked) set.add(value); else set.delete(value);
  }
  state.caseIntake[field]=[...set];
};

function renderCaseCheckboxList(field, options){
  const selected = Array.isArray(state.caseIntake[field]) ? state.caseIntake[field] : [];

        return `<label><input type="checkbox" ${checked} onchange="toggleCaseIntakeMulti('${escapeHtml(field)}','${escapeHtml(opt)}',this.checked);"><span>${escapeHtml(opt)}</span></label>`;
      }).join("")}
    </div>
  `;
}

function hostSelectOptions(currentId){
  const cur = String(currentId ?? "");
  const list = Array.isArray(state.hostsDb) ? state.hostsDb : [];
  const opts = [];
  opts.push(`<option value="">- geen host -</option>`);
  for(const h of list){
    const id = String(h.id);
    const label = (h.name && String(h.name).trim()) ? String(h.name).trim() : (String(h.email||'').trim() || '(zonder naam)');
    const sel = (id === cur) ? "selected" : "";
    opts.push(`<option value="${escapeHtml(id)}" ${sel}>${escapeHtml(label)}</option>`);
  }
  return opts.join("");
}

function findHostById(id){
  const key = String(id ?? "").trim();
  if(!key) return null;
  const list = Array.isArray(state.hostsDb) ? state.hostsDb : [];
  return list.find(h => String(h.id) === key) || null;
}

function renderHostLabel(out){
  const hid = (out && (out.host_id !== null && out.host_id !== undefined)) ? String(out.host_id) : "";
  const name = String(out?.host_name || "").trim();
  const email = String(out?.host_email || "").trim();
  if(name || email){
    return email ? `${name || "Host"} (${email})` : (name || "Host");
  }
  const h = findHostById(hid);
  if(h){
    const em = String(h.email||"").trim();
    return em ? `${h.name} (${em})` : h.name;
  }
  return "-";
}

function hostLevelOptions(cur){

function renderHostMeta(out){

function centsToEur(cents){
  const n = toInt(cents);
  const eur = n / 100;
  return "€" + eur.toFixed(2);
}
async function fetchPayoutsForCase(caseId){
  const out = await fetchJsonSafe(API + "/payouts?case_id=" + encodeURIComponent(caseId), { payouts: [], costs: [], payout_expenses: [] });
  return {
    payouts: Array.isArray(out?.payouts) ? out.payouts : [],
    costs: Array.isArray(out?.costs) ? out.costs : [],
    payout_expenses: Array.isArray(out?.payout_expenses) ? out.payout_expenses : []
  };
}
function detectMealsIncluded(costs){
  return (costs||[]).some(c => String(c.description||"").toLowerCase().includes("meal"));
}
async function loadPayoutsForCase(caseId){
  const holder = document.getElementById("casePayoutBlock");
  if(!holder) return;
  const hid = (state.currentCase && (state.currentCase.host_id!==null && state.currentCase.host_id!==undefined)) ? String(state.currentCase.host_id) : "";
  if(!hid){
    holder.innerHTML = `<div class="banner"><b>Geen host gekoppeld</b><div class="small">Koppel een host en klik “Opslaan host” om payout te tonen.</div></div>`;
    return;
  }
  holder.innerHTML = `<div class="small">Laden…</div>`;
  const data = await fetchPayoutsForCase(caseId);
  state.casePayout = data;
  state.casePayoutIncludeMeals = detectMealsIncluded(data.costs);
  holder.innerHTML = renderPayoutBlock(caseId);
}
function renderPayoutBlock(caseId){
  const hid = (state.currentCase && (state.currentCase.host_id!==null && state.currentCase.host_id!==undefined)) ? String(state.currentCase.host_id) : "";
  if(!hid){
    return `<div class="banner"><b>Geen host gekoppeld</b><div class="small">Koppel een host en klik “Opslaan host”.</div></div>`;
  }

  const costs = state.casePayout?.costs || [];
  const total = (costs||[]).reduce((s,r)=> s + toInt(r.amount_cents), 0);
  const rows = (costs||[]).length ? costs.map(r=>`
    <div class="row"><div>${escapeHtml(String(r.description||""))}</div><div class="amt">${escapeHtml(centsToEur(r.amount_cents))}</div></div>
  `).join("") : `<div class="small">Nog geen payout-regels (klik “Herbereken”).</div>`;

  const checked = state.casePayoutIncludeMeals ? "checked" : "";
  return `
    <div class="breakdown">
      <div class="small">Breakdown (case_costs: host_payout)</div>
      ${rows}
      <div class="row"><div><b>Totaal</b></div><div class="amt"><b>${escapeHtml(centsToEur(total))}</b></div></div>
    </div>
    <label><input type="checkbox" ${checked} onchange="state.casePayoutIncludeMeals=this.checked"> Meals meenemen</label>
    <div class="actions">
      <button class="smallbtn" onclick="recalcHostPayout('${escapeHtml(caseId)}')">Herbereken</button>
      <button class="smallbtn" onclick="markPayoutPaid('${escapeHtml(caseId)}')">Markeer betaald</button>
    </div>
  `;
}

function generateBookingNumber(){
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth()+1).padStart(2,"0");
  const dd = String(now.getDate()).padStart(2,"0");
  const hh = String(now.getHours()).padStart(2,"0");
  const mi = String(now.getMinutes()).padStart(2,"0");
  return `OF-${yyyy}${mm}${dd}-${hh}${mi}`;
}

  if(!amount || amount <= 0){ alert("Ongeldig bedrag"); return; }

  const paidByEl = document.getElementById("receiptPaidBy_" + category);
  const receiptEl = document.getElementById("receiptReceived_" + category);
  const reimbEl = document.getElementById("receiptReimbursable_" + category);
  const urlEl = document.getElementById("receiptUrl_" + category);
  const editId = String(state.financeDraft.payout_expense_edit_id || "").trim();
  const editCategory = String(state.financeDraft.payout_expense_edit_category || "").trim();
  const isEdit = !!editId && editCategory === category;

    case_id: state.currentFinanceCase.id,

    method:"POST",
    headers:{"Content-Type":"application/json","Accept":"application/json"},

window.editPayoutExpense = function(id){
  const rid = String(id||"").trim();
  const rows = Array.isArray(state.casePayout?.payout_expenses) ? state.casePayout.payout_expenses : [];
  const row = rows.find(x => String(x.id||"") === rid);
  if(!row){ alert("Bonregel niet gevonden."); return; }

  let category = String(row.category || "other").toLowerCase();
  if(category === "meals" || category === "lunch") category = "meal";
  if(!["uber","meal","other"].includes(category)) category = "other";

  const amountField = "expense_" + category + "_amount";
  const noteField = "expense_" + category + "_note";

  state.financeDraft.payout_expense_edit_id = rid;
  state.financeDraft.payout_expense_edit_category = category;
  state.financeDraft[amountField] = String(amountCentsToEurNumber(row.amount_cents).toFixed(2)).replace(".", ",");
  state.financeDraft[noteField] = String(row.note || row.description || "");

  const urlEl = document.getElementById("receiptUrl_" + category);
  const paidByEl = document.getElementById("receiptPaidBy_" + category);
  const receiptEl = document.getElementById("receiptReceived_" + category);
  const reimbEl = document.getElementById("receiptReimbursable_" + category);

  if(urlEl) urlEl.value = String(row.receipt_url || "");
  if(paidByEl) paidByEl.value = String(row.paid_by || "host");
  if(receiptEl) receiptEl.checked = !!toBoolInt(row.receipt_received);
  if(reimbEl) reimbEl.checked = !!toBoolInt(row.reimbursable);

  // Re-render to show the edit mode button/label.
  if(state.currentFinanceCase?.id) openFinanceCase(state.currentFinanceCase.id).then(()=>{
    const anchor = document.getElementById("receiptAmount_" + category);
    if(anchor && typeof anchor.scrollIntoView === "function") anchor.scrollIntoView({ behavior:"smooth", block:"center" });
  });
};

function isCaseCustomerFullyPaid(caseObj){
  const c = caseObj || state.currentCase || {};
  const invoiceCalc = computeFinanceInvoiceFromCase(c);
  const totalIncl = round2(invoiceCalc.incl || 0);
  const depositIncl = round2((toInt(c.customer_deposit_cents) || 0) / 100);
  const balancePaidAt = String(c.customer_balance_paid_at || "").trim();
  if(totalIncl <= 0.005) return false;
  if(balancePaidAt) return true;
  return depositIncl >= (totalIncl - 0.005);
}
function customerPaymentOpenAmount(caseObj){
  const c = caseObj || state.currentCase || {};
  const invoiceCalc = computeFinanceInvoiceFromCase(c);
  const totalIncl = round2(invoiceCalc.incl || 0);
  const depositIncl = round2((toInt(c.customer_deposit_cents) || 0) / 100);
  const balancePaidAt = String(c.customer_balance_paid_at || "").trim();
  if(balancePaidAt) return 0;
  return Math.max(0, round2(totalIncl - depositIncl));
}

async function setJourneyStatusAndRefresh(nextStatus, label){
  if(!state.currentCase?.id){
    alert("Geen journey geselecteerd.");
    return;
  }
  if(nextStatus === "handed_to_host"){
    const hostId = String(state.caseForm?.host_id ?? state.currentCase?.host_id ?? "").trim();
    if(!hostId){
      alert("Koppel eerst een host voordat je overdraagt.");
      return;
    }
    if(journeyStatusNorm(state.currentCase?.status || state.caseForm?.status) !== "phase_1"){
      alert("Zet deze journey eerst op ‘Offerte akkoord’. Daarna kun je voorbereiden en na betaling definitief overdragen.");
      return;
    }
    if(!isCaseCustomerFullyPaid(state.currentCase)){
      const open = customerPaymentOpenAmount(state.currentCase);
      alert("Deze journey kan nog niet definitief worden overgedragen aan de host. De klantbetaling is nog niet compleet voldaan. Nog open: " + eur2(open) + ". Gebruik eventueel de Signal-template ‘beschikbaarheid’ zolang dit pending is.");
      return;
    }
  }
  const ok = await saveCasePatch({ status: nextStatus });
  if(!ok) return;
  state.caseForm.status = nextStatus;
  if(state.currentCase) state.currentCase.status = nextStatus;
  alert(label || "Status bijgewerkt");
  await refreshAll();
  if(nextStatus === "handed_to_host") state.caseFilters.view = "host";
  else if(nextStatus === "phase_1") state.caseFilters.view = "accepted";
  else if(nextStatus === "completed") state.caseFilters.view = "done";
  else state.caseFilters.view = "active";
  if(state.currentCase?.id) await openCase(state.currentCase.id);
  if(state.page === "cases") renderCaseList();
}

function allMessagesCombined(){
  const a = Array.isArray(state.messagesAll) ? state.messagesAll : [];
  const u = Array.isArray(state.messagesUnlinked) ? state.messagesUnlinked : [];

  const seen = new Set();
  const out = [];

  for(const m of u){
    if(!m || !m.id) continue;
    if(seen.has(m.id)) continue;
    seen.add(m.id);
    out.push(m);
  }

  for(const m of a){
    if(!m || !m.id) continue;
    if(seen.has(m.id)) continue;
    seen.add(m.id);
    out.push(m);
  }

  out.sort((x,y)=>String(y.created_at||"").localeCompare(String(x.created_at||"")));
  return out;
}

function getFilteredMessages(){
  const f = state.messageFilters || { scope:"website", q:"" };
  const scope = String(f.scope||"website");
  const q = normalizeKey(f.q);

  const list = allMessagesCombined();
  const showHidden = String(f.show_hidden||"0") === "1";
  const hidden = state.hiddenMessageIds || {};

  return list.filter(m=>{
    if(!showHidden && hidden[String(m.id)]) return false;
    const intakeId = m.intake_id;
    const src = String(m.source||"");
    const isWebsiteUnlinked = (src === "website" && (intakeId === null || intakeId === undefined || intakeId === ""));
    const isLinked = !!intakeId;

    if(scope === "website" && !isWebsiteUnlinked) return false;
    if(scope === "gekoppeld" && !isLinked) return false;

    if(q){
      const hay = [
        m.name, m.email, m.phone, m.topic,
        m.source, m.intake_id, m.message
      ].map(x=>normalizeKey(x)).join(" ");
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function round2(n){ return Math.round((Number(n)||0) * 100) / 100; }
function financeInclToExcl(incl){ return round2((Number(incl)||0) / 1.21); }
function financeVatFromIncl(incl){ return round2((Number(incl)||0) - financeInclToExcl(incl)); }
function eur2(n){ return "€" + round2(n).toFixed(2); }
function amountCentsToEurNumber(c){ return round2((toInt(c)||0) / 100); }
function computeFinanceInvoiceFromCase(out){
  const serviceName = String(out?.offer_service || out?.service || "").trim();
  const base = priceForService(serviceName);
  const extraDays = serviceName==="Adventure" ? clampExtraDays(out?.offer_extra_days || 0) : 0;
  const late = toBoolInt(out?.offer_late_arrival) ? LATE_ARRIVAL_EUR : 0;
  const pickupKm = toInt(out?.offer_pickup_km || 0);
  const overKm = Math.max(0, pickupKm - PICKUP_FREE_KM);
  const pickup = round2(overKm * PICKUP_RATE_EUR_PER_KM);
  const descParts = splitDescriptionAndMeta(String(out?.offer_description || ""));
  const groceries = toBoolInt(descParts?.meta?.groceries_service) ? GROCERIES_SERVICE_EUR : 0;
  const lines = [];
  if(base>0) lines.push({ label: `Dienst: ${serviceName||"-"}`, incl: base });
  if(extraDays>0) lines.push({ label: `Extra dag(en): ${extraDays} × ${euro(EXTRA_DAY_PRICE_EUR)}`, incl: extraDays * EXTRA_DAY_PRICE_EUR });
  if(groceries>0) lines.push({ label: "Boodschappenservice", incl: groceries });
  if(late>0) lines.push({ label: "Late arrival", incl: late });
  if(pickup>0) lines.push({ label: `Pickup > ${PICKUP_FREE_KM} km`, incl: pickup });
  const incl = round2(lines.reduce((s,l)=>s + Number(l.incl||0), 0));
  const excl = financeInclToExcl(incl);
  const vat = financeVatFromIncl(incl);
  return { lines, incl, excl, vat };
}
function summarizeFinanceCosts(data){
  const costs = Array.isArray(data?.costs) ? data.costs : [];
  let uber = 0, meals = 0, other = 0;
  for(const c of costs){
    const desc = String(c.description || c.note || "").trim().toLowerCase();
    const amount = amountCentsToEurNumber(c.amount_cents);

    // Host payout breakdown is informational only and must not hit margin twice
    if(
      desc.includes("base ") ||
      desc.includes("extra day") ||
      desc.includes("late night") ||
      desc.includes("pickup") ||
      desc.includes("host payout")
    ){
      continue;
    }

    if(desc.includes("uber")) uber += amount;
    else if(desc.includes("meal") || desc.includes("maalt") || desc.includes("lunch")) meals += amount;
    else other += amount;
  }
  return { uber: round2(uber), meals: round2(meals), other: round2(other), total: round2(uber+meals+other) };
}

function payoutExpenseCategoryLabel(cat){
  const c = String(cat||"").toLowerCase();
  if(c==="uber") return "Uber";
  if(c==="meal") return "Meals";
  return "Other";
}
function summarizePayoutExpenses(data){
  const rows = Array.isArray(data?.payout_expenses) ? data.payout_expenses : [];
  let uber = 0, meals = 0, other = 0, reimbursable = 0, nonReimbursable = 0;
  for(const r of rows){
    const amt = amountCentsToEurNumber(r.amount_cents);
    const isReimb = toBoolInt(r.reimbursable);
    if(isReimb) reimbursable += amt; else nonReimbursable += amt;
    const cat = String(r.category||"").toLowerCase();
    if(cat==="uber") uber += amt;
    else if(cat==="meal" || cat==="meals" || cat==="lunch") meals += amt;
    else other += amt;
  }
  return {
    rows,
    uber: round2(uber),
    meals: round2(meals),
    other: round2(other),
    reimbursable: round2(reimbursable),
    nonReimbursable: round2(nonReimbursable),
    total: round2(reimbursable + nonReimbursable)
  };
}

function summarizeHostPayout(data){
  const payouts = Array.isArray(data?.payouts) ? data.payouts : [];
  const costs = Array.isArray(data?.costs) ? data.costs : [];
  const expenses = Array.isArray(data?.payout_expenses) ? data.payout_expenses : [];

  const latest = payouts.length ? payouts[0] : null;

  const baseBreakdown = costs
    .filter(c => String(c.type||"") === "host_payout" || String(c.description||"").toLowerCase().includes("base ") || String(c.description||"").toLowerCase().includes("extra day") || String(c.description||"").toLowerCase().includes("pickup") || String(c.description||"").toLowerCase().includes("late night"))
    .map(c => ({
      desc: String(c.description || "Host payout detail"),
      amount: amountCentsToEurNumber(c.amount_cents)
    }));

  const reimbursementBreakdown = expenses
    .filter(x => toBoolInt(x.reimbursable))
    .map(x => ({
      desc: `${payoutExpenseCategoryLabel(x.category)} reimbursement${x.description ? " — " + String(x.description) : ""}`,
      amount: amountCentsToEurNumber(x.amount_cents)
    }));

  const baseTotal = round2(baseBreakdown.reduce((s,r)=>s+Number(r.amount||0),0));
  const reimbTotal = round2(reimbursementBreakdown.reduce((s,r)=>s+Number(r.amount||0),0));
  const computedTotal = round2(baseTotal + reimbTotal);
  const payoutTotal = latest ? amountCentsToEurNumber(latest.amount_cents) : 0;
  const total = Math.max(computedTotal, payoutTotal);

  const rows = latest ? [{
    desc: String(latest.status || "").trim()==="paid" ? "Host payout (paid)" : "Host payout",
    amount: total
  }] : (total > 0 ? [{ desc: "Host payout", amount: total }] : []);

  const breakdown = [...baseBreakdown, ...reimbursementBreakdown];

  return {
    rows,
    total: round2(total),
    baseTotal,
    reimbursableTotal: reimbTotal,
    breakdown,
    latest
  };
}

/* ========= HOST view helpers (read-only) ========= */

function hostCostCategory(cost){
  const desc = String(cost?.description || cost?.note || "").trim().toLowerCase();

  // Skip informational/breakdown rows that are not receipts/cost items
  if(
    desc.includes("base ") ||
    desc.includes("extra day") ||
    desc.includes("late night") ||
    desc.includes("pickup") ||
    desc.includes("host payout")
  ){
    return "skip";
  }

  if(desc.includes("uber")) return "uber";
  if(desc.includes("meal") || desc.includes("maalt") || desc.includes("lunch")) return "meals";
  return "other";
}
function hostFormatCostDate(c){
  const v = c?.cost_date || c?.date || c?.created_at || c?.updated_at || "";
  if(!v) return "";
  return formatDateNL(String(v).slice(0,10));
}
function hostRenderCostItems(costs, cat){
  const list = (costs||[]).filter(c => hostCostCategory(c)===cat);
  if(!list.length) return `<div class="small">Geen items.</div>`;

  list.sort((a,b)=> String(b?.cost_date||b?.date||b?.created_at||"").localeCompare(String(a?.cost_date||a?.date||a?.created_at||"")));

  return `
    <div class="breakdown">
      ${list.map(c=>{
        const amt = amountCentsToEurNumber(c.amount_cents);
        const d = hostFormatCostDate(c);
        const desc = String(c.description || "").trim() || String(c.note || "").trim() || "(zonder omschrijving)";
        const note = String(c.note || "").trim();
        const rid = String(c.id || "");
        return `
          <div class="row">
            <div>${escapeHtml(d)} <span class="small">#${escapeHtml(rid)}</span><br><span class="small">${escapeHtml(desc)}</span>${note && note!==desc ? `<div class="small" style="white-space:pre-wrap;margin-top:.15rem">${escapeHtml(note)}</div>` : ``}</div>
            <div class="amt">${escapeHtml(eur2(amt))}</div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

  const out = ct.includes("application/json") ? await res.json().catch(()=> ({})) : {};
  if(!res.ok){
    document.getElementById("middleDetail").innerHTML = `<div class="small">Finance laden mislukt: ${escapeHtml(formatApiError(out, String(res.status)))}</div>`;
    document.getElementById("rightContent").innerHTML = `<div class="small">-</div>`;
