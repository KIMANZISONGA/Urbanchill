          <label class="label">Betaald door</label>
          <select id="receiptPaidBy_meal"><option value="host" selected>Host</option><option value="urban_chill">UrbanChill</option><option value="client">Klant</option></select>
          <div class="receipt-options">
            <label class="receipt-check"><input id="receiptReceived_meal" type="checkbox" checked><span>Bon ontvangen</span></label>
            <label class="receipt-check"><input id="receiptReimbursable_meal" type="checkbox" checked><span>Terugbetalen aan host</span></label>
          </div>
          <div class="actions">
            <button class="smallbtn" onclick="addPayoutExpense('meal')">${editingReceiptCategory==="meal" ? "Wijziging opslaan" : "Bon opslaan"}</button>
            ${editingReceiptCategory==="meal" ? `<button class="smallbtn" onclick="cancelPayoutExpenseEdit()">Annuleren</button>` : ``}
          </div>
        </div>

        <div class="section">
          <h4>📦 Other bon</h4>
          <input id="receiptAmount_other" value="${escapeHtml(d.expense_other_amount || '')}" oninput="setFinanceDraft('expense_other_amount', this.value)" placeholder="Bedrag €">
          <input value="${escapeHtml(d.expense_other_note || '')}" oninput="setFinanceDraft('expense_other_note', this.value)" placeholder="Omschrijving / notitie">
          <input id="receiptUrl_other" placeholder="Receipt URL optioneel">
          <label class="label">Betaald door</label>
          <select id="receiptPaidBy_other"><option value="host" selected>Host</option><option value="urban_chill">UrbanChill</option><option value="client">Klant</option></select>
          <div class="receipt-options">
            <label class="receipt-check"><input id="receiptReceived_other" type="checkbox" checked><span>Bon ontvangen</span></label>
            <label class="receipt-check"><input id="receiptReimbursable_other" type="checkbox" checked><span>Terugbetalen aan host</span></label>
          </div>
          <div class="actions">
            <button class="smallbtn" onclick="addPayoutExpense('other')">${editingReceiptCategory==="other" ? "Wijziging opslaan" : "Bon opslaan"}</button>
            ${editingReceiptCategory==="other" ? `<button class="smallbtn" onclick="cancelPayoutExpenseEdit()">Annuleren</button>` : ``}
          </div>
        </div>

        <div class="section">
          <h4>📚 Geregistreerde bonnen</h4>
          ${renderReceiptRows(state.casePayout)}
        </div>
      </div>

      
<div class="section">
  <h4>🧾 Interne kostenregels (case_costs)</h4>
  <div class="hint">Alleen gebruiken voor kosten die niet als host-bon/reimbursement lopen.</div>

  <div class="breakdown">
    ${(Array.isArray(state.casePayout?.costs) ? state.casePayout.costs : [])
      .filter(x => String(x.type||"") === "expense")
      .map(x => `
        <div class="row">
          <div>
            ${escapeHtml(String(x.description||""))}
            <div class="small">${escapeHtml(safeDateString(x.created_at||""))}</div>
          </div>
          <div class="amt" style="text-align:right">
            ${escapeHtml(eur2(amountCentsToEurNumber(x.amount_cents)))}
            <div class="actions" style="margin-top:.25rem;justify-content:flex-end">
              <button class="smallbtn" onclick="financeDeleteExpense('${'${'}escapeHtml(String(x.id||''))${'}'}')">Verwijder</button>
            </div>
          </div>
        </div>
      `).join("")
    || `<div class="small">Geen expense regels gevonden.</div>`}
  </div>
</div><div class="section">
        <h4>🧾 Compose</h4>
        <label class="label">To</label>
        <input value="${escapeHtml(state.compose?.to || out.client_email || '')}" readonly>
        <label class="label">Subject</label>
        <input value="${escapeHtml(state.compose?.subject || '')}" readonly>
        <label class="label">Body</label>
        <textarea style="min-height:160px" readonly>${escapeHtml(state.compose?.body || '')}</textarea>
      </div>
    </div>
  `;
}

/* ========= data loading ========= */
async function loadIntakes(){ state.intakes = await fetchArraySafe(API + "/intakes"); }
async function loadCases(){ state.cases = await fetchArraySafe(API + "/cases"); }
async function loadMessagesUnlinked(){ state.messagesUnlinked = await fetchArraySafe(API + "/messages/unlinked"); updateMessagesBadge(); }

async function refreshAll(){
  await Promise.all([
    loadServices(),
    loadHostsDb(),
    loadHostApplications("all"),
    loadIntakes(),
    loadCases(),
    loadMessagesUnlinked()
  ]);

  const page = String(state.page || "intakes");

  if(page==="intakes"){
    renderIntakeList();
    renderOverviewState("intakes");
    return;
  }

  if(page==="cases"){
    renderCaseList();
    renderOverviewState("cases");
    return;
  }

  if(page==="finance"){
    await renderFinance();
    return;
  }

  if(page==="host"){
    renderHostPage();
    renderOverviewState("host");
    return;
  }

  if(page==="overhead"){
    await renderOverheadPage();
    return;
  }

  renderMessagesList();
  renderOverviewState("messages");
}

/* ========= init ========= */
(async function init(){
  state.hiddenMessageIds = loadHiddenMessageIds();
  await refreshAll();
  setPage("intakes");
})();

function saveInvoicePaid(){
  const id = state.currentCase?.id;
  const val = document.getElementById('invoicePaid').value;
  apiFetch('/api/case/invoice-paid',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id, invoice_paid:val})
  }).then(r=>r.json()).then(d=>{
    if(d.success){
      document.getElementById('invoiceLockedMsg').innerText = val==='yes' ? '✔ Definitief verwerkt' : '';
      refreshAll();
    }else alert(JSON.stringify(d));
  });
}

function unlockInvoice(){
  const id = state.currentCase?.id;
  const code = document.getElementById('unlockCode').value;
  const reason = document.getElementById('unlockReason').value;
  apiFetch('/api/case/invoice-unlock',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id, code, reason})
  }).then(r=>r.json()).then(d=>{
    if(d.success){
      alert('Factuur heropend');
      refreshAll();
    }else alert(JSON.stringify(d));
  });
}

function saveClientPayment(){
  alert('Client payment status opgeslagen (placeholder)');
}

function financeDeleteExpense(costId){
  const id = String(costId || "").trim();
  if(!id){ alert("missing id"); return; }
  if(!confirm("Kostenregel verwijderen?")) return;

  apiFetch(API + "/finance/delete",{
    method:"POST",
    headers:{ "Content-Type":"application/json", "Accept":"application/json" },
    body: JSON.stringify({ id })
  }).then(r=>r.json().catch(()=>({}))).then(d=>{
    if(d && d.success){
      const out = state.currentFinanceCase || state.currentCase;
      refreshAll().then(()=> out?.id ? openFinanceCase(out.id) : null);
    }else{
      alert(JSON.stringify(d||{}));
    }
  }).catch(err=> alert(String(err||"error")));
}



async function sendComposedMailResend() {
  if (!state?.currentIntake?.id) {
    alert("Geen intake geselecteerd.");
    return;
  }
  const to = (document.getElementById("composeTo")?.value || "").trim();
  const subject = (document.getElementById("composeSubject")?.value || "").trim();
  const body = (document.getElementById("composeBody")?.value || "").trim();
  if (!to || !subject || !body) {
    alert("To / Subject / Body zijn verplicht.");
    return;
  }

  try {
    const res = await apiFetch("/api/email/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        intake_id: state.currentIntake.id,
        to,
        subject,
        body,
        source: "client_email"
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      alert("Versturen mislukt: " + (err.error || err.message || res.status));
      return;
    }

    alert("Verzonden ✅ (en gelogd)");

    // Best-effort refresh of dossier messages
    if (typeof loadMessagesForCurrentIntake === "function") {
      await loadMessagesForCurrentIntake();
    } else if (typeof renderRightPanel === "function") {
      await renderRightPanel();
    }
  } catch (e) {
    alert("Versturen mislukt: " + (e?.message || e));
  }
}
</script>
