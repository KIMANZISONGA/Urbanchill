<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UrbanChill Cockpit v4</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">

<style>
body{background:#0f172a;color:#e2e8f0}
.layout{display:grid;grid-template-columns:300px 1fr 340px;gap:1rem}
.panel{background:#020617;padding:1rem;border-radius:12px}
.item{padding:.6rem;border-bottom:1px solid #1e293b;cursor:pointer}
.item:hover{background:#1e293b}
input,select,textarea{background:#020617;color:#e2e8f0}
.small{font-size:12px;color:#94a3b8}
</style>
</head>

<body>

<nav class="container-fluid">
<ul><li><strong>UrbanChill v4</strong></li></ul>
<ul><li><a href="#" onclick="refreshAll()">Refresh</a></li></ul>
</nav>

<main class="container">
<div class="layout">

<!-- LEFT -->
<section class="panel">
<h3>Intakes</h3>
<div id="list"></div>
</section>

<!-- MIDDLE -->
<section class="panel">
<h3>Klantdossier</h3>
<div id="detail">Selecteer intake...</div>
</section>

<!-- RIGHT -->
<section class="panel">
<h3>Offerte</h3>
<div id="offer"></div>

<hr>

<h3>Timeline</h3>
<div id="timeline"></div>

<hr>

<h3>Cases</h3>
<div id="cases"></div>
</section>

</div>
</main>

<script>
const API = "/api";

let state = {
  intakes: [],
  cases: [],
  messages: [],
  current: null,
  form: {},
  offer: {}
};

/* =========================
   HELPERS
========================= */

function safeArray(v){
  try{
    return Array.isArray(v) ? v : JSON.parse(v || "[]");
  }catch{
    return [];
  }
}

window.setField = (f,v)=>state.form[f]=v;

window.setMulti = function(field, select){
  const values = Array.from(select.selectedOptions).map(o => o.value);
  state.form[field] = values;
};

/* =========================
   LOAD
========================= */

async function load(){
  const res = await fetch(API + "/intakes");
  state.intakes = await res.json();
  renderList();

  if(state.intakes.length){
    openItem(state.intakes[0].id);
  }
}

async function loadCases(){
  const res = await fetch(API + "/cases");
  state.cases = await res.json();
  renderCases();
}

async function loadMessages(id){
  const res = await fetch(API + "/messages?intake_id=" + id);
  state.messages = await res.json();
  renderTimeline();
}

/* =========================
   LIST
========================= */

function renderList(){
  const el = document.getElementById("list");

  el.innerHTML = state.intakes.map(i => `
    <div class="item" onclick="openItem('${i.id}')">
      <b>${i.name || "-"}</b><br>
      ${i.email || ""}
    </div>
  `).join("");
}

/* =========================
   OPEN
========================= */

window.openItem = function(id){
  const item = state.intakes.find(i => i.id === id);
  if(!item) return;

  state.current = item;
  state.form = {...item};

  state.offer = {
    price: item.offer_price || 1500,
    extra_days: item.offer_extra_days || 0,
    pickup_km: item.offer_pickup_km || 0
  };

  renderDetail();
  renderOffer();
  loadMessages(id);
}

/* =========================
   DETAIL (FULL INTAKE)
========================= */

function renderDetail(){
  const i = state.form;

  const activities = safeArray(i.activities);
  const dietary = safeArray(i.dietary_preferences);

  document.getElementById("detail").innerHTML = `

    <h4>Basis</h4>

    Naam:<br>
    <input value="${i.name||""}" onchange="setField('name',this.value)"><br>

    Email:<br>
    <input value="${i.email||""}" onchange="setField('email',this.value)"><br>

    Telefoon:<br>
    <input value="${i.phone||""}" onchange="setField('phone',this.value)"><br>

    Dienst:<br>
    <select onchange="setField('service',this.value)">
      <option ${i.service==="solo"?"selected":""}>solo</option>
      <option ${i.service==="remote"?"selected":""}>remote</option>
      <option ${i.service==="adventure"?"selected":""}>adventure</option>
    </select>

    <br><br>

    <h4>Activiteiten</h4>

    <select multiple onchange="setMulti('activities',this)">
      <option value="nightlife" ${activities.includes("nightlife")?"selected":""}>Nightlife</option>
      <option value="beach" ${activities.includes("beach")?"selected":""}>Beach</option>
      <option value="food" ${activities.includes("food")?"selected":""}>Food</option>
      <option value="sports" ${activities.includes("sports")?"selected":""}>Sports</option>
      <option value="culture" ${activities.includes("culture")?"selected":""}>Culture</option>
      <option value="relax" ${activities.includes("relax")?"selected":""}>Relax</option>
    </select>

    <br><br>

    <h4>Dieet</h4>

    <select multiple onchange="setMulti('dietary_preferences',this)">
      <option value="vegan" ${dietary.includes("vegan")?"selected":""}>Vegan</option>
      <option value="halal" ${dietary.includes("halal")?"selected":""}>Halal</option>
      <option value="vegetarian" ${dietary.includes("vegetarian")?"selected":""}>Vegetarian</option>
      <option value="gluten_free" ${dietary.includes("gluten_free")?"selected":""}>Gluten free</option>
    </select>

    <br><br>

    <h4>Legitimatie</h4>

    <select onchange="setField('verified_identity',this.value)">
      <option value="">-- kies --</option>
      <option value="passport" ${i.verified_identity==="passport"?"selected":""}>Paspoort</option>
      <option value="id_card" ${i.verified_identity==="id_card"?"selected":""}>ID kaart</option>
      <option value="drivers_license" ${i.verified_identity==="drivers_license"?"selected":""}>Rijbewijs</option>
    </select>

    <br><br>

    Notities:<br>
    <textarea onchange="setField('notes',this.value)">${i.notes||""}</textarea>

    <br><br>

    <button onclick="save()">Opslaan</button>
  `;
}

/* =========================
   OFFER
========================= */

function renderOffer(){
  const o = state.offer;

  const total =
    (parseInt(o.price)||0) +
    (parseInt(o.extra_days)||0)*200 +
    (parseInt(o.pickup_km)||0)*2;

  document.getElementById("offer").innerHTML = `
    Basis prijs:<br>
    <input value="${o.price}" onchange="setOffer('price',this.value)"><br>

    Extra dagen:<br>
    <input value="${o.extra_days}" onchange="setOffer('extra_days',this.value)"><br>

    Pickup km:<br>
    <input value="${o.pickup_km}" onchange="setOffer('pickup_km',this.value)"><br>

    <hr>

    <b>Totaal: €${total}</b>

    <br><br>

    <button onclick="saveOffer()">Save offer</button>
    <button onclick="sendOffer()">Send offer</button>
  `;
}

window.setOffer = (f,v)=>state.offer[f]=v;

/* =========================
   SAVE
========================= */

window.save = async function(){
  await fetch(API + "/intake/update",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id: state.current.id,
      ...state.form
    })
  });

  alert("saved");
}

/* =========================
   OFFER
========================= */

window.saveOffer = async function(){
  await fetch(API + "/intake/offer",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id: state.current.id,
      ...state.offer
    })
  });

  alert("offer saved");
}

window.sendOffer = async function(){
  await fetch(API + "/intake/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id: state.current.id})
  });

  alert("sent");
  loadMessages(state.current.id);
}

/* =========================
   TIMELINE
========================= */

function renderTimeline(){
  const el = document.getElementById("timeline");

  el.innerHTML = state.messages.map(m => `
    <div class="item">
      <div class="small">${m.created_at ? new Date(m.created_at).toLocaleString() : ""}</div>
      <b>${m.source||"system"}</b><br>
      ${m.message||""}
    </div>
  `).join("");
}

/* =========================
   CASES
========================= */

function renderCases(){
  const el = document.getElementById("cases");

  el.innerHTML = state.cases.map(c => `
    <div class="item">
      <b>${c.client_name}</b>
    </div>
  `).join("");
}

/* =========================
   INIT
========================= */

window.refreshAll = async ()=>{
  await load();
  await loadCases();
}

load();
loadCases();
</script>

</body>
</html>
